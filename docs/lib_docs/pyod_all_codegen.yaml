    docstring: "Wrapper of scikit-learn Isolation Forest with more functionalities.\n\nThe IsolationForest 'isolates' observations by randomly selecting a\nfeature and then randomly selecting a split value between the maximum and\nminimum values of the selected feature.\nSee :cite:`liu2008isolation,liu2012isolation` for details.\n\nSince recursive partitioning can be represented by a tree structure, the\nnumber of splittings required to isolate a sample is equivalent to the path\nlength from the root node to the terminating node.\n\nThis path length, averaged over a forest of such random trees, is a\nmeasure of normality and our decision function.\n\nRandom partitioning produces noticeably shorter paths for anomalies.\nHence, when a forest of random trees collectively produce shorter path\nlengths for particular samples, they are highly likely to be anomalies.\n\nParameters\n----------\nn_estimators : int, optional (default=100)\n    The number of base estimators in the ensemble.\n\nmax_samples : int or float, optional (default=\"auto\")\n    The number of samples to draw from X to train each base estimator.\n\n        - If int, then draw `max_samples` samples.\n        - If float, then draw `max_samples * X.shape[0]` samples.\n        - If \"auto\", then `max_samples=min(256, n_samples)`.\n\n    If max_samples is larger than the number of samples provided,\n    all samples will be used for all trees (no sampling).\n\ncontamination : float in (0., 0.5), optional (default=0.1)\n    The amount of contamination of the data set, i.e. the proportion\n    of outliers in the data set. Used when fitting to define the threshold\n    on the decision function.\n\nmax_features : int or float, optional (default=1.0)\n    The number of features to draw from X to train each base estimator.\n\n        - If int, then draw `max_features` features.\n        - If float, then draw `max_features * X.shape[1]` features.\n\nbootstrap : bool, optional (default=False)\n    If True, individual trees are fit on random subsets of the training\n    data sampled with replacement. If False, sampling without replacement\n    is performed.\n\nn_jobs : integer, optional (default=1)\n    The number of jobs to run in parallel for both `fit` and `predict`.\n    If -1, then the number of jobs is set to the number of cores.\n\nbehaviour : str, default='old'\n    Behaviour of the ``decision_function`` which can be either 'old' or\n    'new'. Passing ``behaviour='new'`` makes the ``decision_function``\n    change to match other anomaly detection algorithm API which will be\n    the default behaviour in the future. As explained in details in the\n    ``offset_`` attribute documentation, the ``decision_function`` becomes\n    dependent on the contamination parameter, in such a way that 0 becomes\n    its natural threshold to detect outliers.\n\n    .. versionadded:: 0.7.0\n       ``behaviour`` is added in 0.7.0 for back-compatibility purpose.\n\n    .. deprecated:: 0.20\n       ``behaviour='old'`` is deprecated in sklearn 0.20 and will not be\n       possible in 0.22.\n\n    .. deprecated:: 0.22\n       ``behaviour`` parameter will be deprecated in sklearn 0.22 and\n       removed in 0.24.\n\n    .. warning::\n        Only applicable for sklearn 0.20 above.\n\nrandom_state : int, RandomState instance or None, optional (default=None)\n    If int, random_state is the seed used by the random number generator;\n    If RandomState instance, random_state is the random number generator;\n    If None, the random number generator is the RandomState instance used\n    by `np.random`.\n\nverbose : int, optional (default=0)\n    Controls the verbosity of the tree building process.\n\nAttributes\n----------\nestimators_ : list of DecisionTreeClassifier\n    The collection of fitted sub-estimators.\n\nestimators_samples_ : list of arrays\n    The subset of drawn samples (i.e., the in-bag samples) for each base\n    estimator.\n\nmax_samples_ : integer\n    The actual number of samples\n\ndecision_scores_ : numpy array of shape (n_samples,)\n    The outlier scores of the training data.\n    The higher, the more abnormal. Outliers tend to have higher\n    scores. This value is available once the detector is\n    fitted.\n\nthreshold_ : float\n    The threshold is based on ``contamination``. It is the\n    ``n_samples * contamination`` most abnormal samples in\n    ``decision_scores_``. The threshold is calculated for generating\n    binary outlier labels.\n\nlabels_ : int, either 0 or 1\n    The binary labels of the training data. 0 stands for inliers\n    and 1 for outliers/anomalies. It is generated by applying\n    ``threshold_`` on ``decision_scores_``."
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom pyod.models.iforest import IForest\n\nobj = IForest(\n    n_estimators=100,\n    max_samples='auto',\n    contamination=0.1,\n    max_features=1.0,\n    bootstrap=False,\n    n_jobs=1,\n    behaviour='old',\n    random_state=None,\n    verbose=0,\n)\n"
