    return_type: float
    docstring: "Estimates the (normalized) Continuous Ranked Probability Score (CRPS) based on the given data and generation\nprocess. This is used to check the calibration of a probabilistic prediction.\n\n:param X: Observations of the input features.\n:param Y: Observations of the corresponding target value.\n:param conditional_sampling_method: Method to sample from the conditional given an input sample from X.\n:param num_conditional_samples: Number of samples that should be drawn from the conditional to estimate the CRPS.\n:param normalize: If True, the target values are normalized in the continuous case by the standard deviation of the\n                  expected Y values. By this, the CRPS become comparable across different scales.\n:return: The Continuous Ranked Probability Score."
    params:
      -
        name: X
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
