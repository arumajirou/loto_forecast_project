    docstring: "Wrapper of scikit-learn LOF Class with more functionalities.\nUnsupervised Outlier Detection using Local Outlier Factor (LOF).\n\nThe anomaly score of each sample is called Local Outlier Factor.\nIt measures the local deviation of density of a given sample with\nrespect to its neighbors.\nIt is local in that the anomaly score depends on how isolated the object\nis with respect to the surrounding neighborhood.\nMore precisely, locality is given by k-nearest neighbors, whose distance\nis used to estimate the local density.\nBy comparing the local density of a sample to the local densities of\nits neighbors, one can identify samples that have a substantially lower\ndensity than their neighbors. These are considered outliers.\nSee :cite:`breunig2000lof` for details.\n\nParameters\n----------\nn_neighbors : int, optional (default=20)\n    Number of neighbors to use by default for `kneighbors` queries.\n    If n_neighbors is larger than the number of samples provided,\n    all samples will be used.\n\nalgorithm : {'auto', 'ball_tree', 'kd_tree', 'brute'}, optional\n    Algorithm used to compute the nearest neighbors:\n\n    - 'ball_tree' will use BallTree\n    - 'kd_tree' will use KDTree\n    - 'brute' will use a brute-force search.\n    - 'auto' will attempt to decide the most appropriate algorithm\n      based on the values passed to :meth:`fit` method.\n\n    Note: fitting on sparse input will override the setting of\n    this parameter, using brute force.\n\nleaf_size : int, optional (default=30)\n    Leaf size passed to `BallTree` or `KDTree`. This can\n    affect the speed of the construction and query, as well as the memory\n    required to store the tree. The optimal value depends on the\n    nature of the problem.\n\nmetric : string or callable, default 'minkowski'\n    metric used for the distance computation. Any metric from scikit-learn\n    or scipy.spatial.distance can be used.\n\n    If 'precomputed', the training input X is expected to be a distance\n    matrix.\n\n    If metric is a callable function, it is called on each\n    pair of instances (rows) and the resulting value recorded. The callable\n    should take two arrays as input and return one value indicating the\n    distance between them. This works for Scipy's metrics, but is less\n    efficient than passing the metric name as a string.\n\n    Valid values for metric are:\n\n    - from scikit-learn: ['cityblock', 'cosine', 'euclidean', 'l1', 'l2',\n      'manhattan']\n\n    - from scipy.spatial.distance: ['braycurtis', 'canberra', 'chebyshev',\n      'correlation', 'dice', 'hamming', 'jaccard', 'kulsinski',\n      'mahalanobis', 'matching', 'minkowski', 'rogerstanimoto',\n      'russellrao', 'seuclidean', 'sokalmichener', 'sokalsneath',\n      'sqeuclidean', 'yule']\n\n    See the documentation for scipy.spatial.distance for details on these\n    metrics:\n    http://docs.scipy.org/doc/scipy/reference/spatial.distance.html\n\np : integer, optional (default = 2)\n    Parameter for the Minkowski metric from\n    sklearn.metrics.pairwise.pairwise_distances. When p = 1, this is\n    equivalent to using manhattan_distance (l1), and euclidean_distance\n    (l2) for p = 2. For arbitrary p, minkowski_distance (l_p) is used.\n    See http://scikit-learn.org/stable/modules/generated/sklearn.metrics.pairwise.pairwise_distances\n\nmetric_params : dict, optional (default = None)\n    Additional keyword arguments for the metric function.\n\ncontamination : float in (0., 0.5), optional (default=0.1)\n    The amount of contamination of the data set, i.e. the proportion\n    of outliers in the data set. When fitting this is used to define the\n    threshold on the decision function.\n\nn_jobs : int, optional (default = 1)\n    The number of parallel jobs to run for neighbors search.\n    If ``-1``, then the number of jobs is set to the number of CPU cores.\n    Affects only kneighbors and kneighbors_graph methods.\n\nnovelty : bool (default=False)\n    By default, LocalOutlierFactor is only meant to be used for outlier\n    detection (novelty=False). Set novelty to True if you want to use\n    LocalOutlierFactor for novelty detection. In this case be aware that\n    that you should only use predict, decision_function and score_samples\n    on new unseen data and not on the training set.\n\nAttributes\n----------\nn_neighbors_ : int\n    The actual number of neighbors used for `kneighbors` queries.\n\ndecision_scores_ : numpy array of shape (n_samples,)\n    The outlier scores of the training data.\n    The higher, the more abnormal. Outliers tend to have higher\n    scores. This value is available once the detector is\n    fitted.\n\nthreshold_ : float\n    The threshold is based on ``contamination``. It is the\n    ``n_samples * contamination`` most abnormal samples in\n    ``decision_scores_``. The threshold is calculated for generating\n    binary outlier labels.\n\nlabels_ : int, either 0 or 1\n    The binary labels of the training data. 0 stands for inliers\n    and 1 for outliers/anomalies. It is generated by applying\n    ``threshold_`` on ``decision_scores_``."
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom pyod.models.lof import LOF\n\nobj = LOF(\n    n_neighbors=20,\n    algorithm='auto',\n    leaf_size=30,\n    metric='minkowski',\n    p=2,\n    metric_params=None,\n    contamination=0.1,\n    n_jobs=1,\n    novelty=True,\n)\n"
