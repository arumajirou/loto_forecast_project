    type: function
    name: adamic_adar_index
    path: networkx.algorithms.link_prediction.adamic_adar_index
    module: networkx.algorithms.link_prediction
    library: networkx
    top_group: networkx.algorithms
    role: other
    name_cluster: 481
    event_like: False
    return_type: ""
    docstring: "Compute the Adamic-Adar index of all node pairs in ebunch.\n\nAdamic-Adar index of `u` and `v` is defined as\n\n.. math::\n\n    \\sum_{w \\in \\Gamma(u) \\cap \\Gamma(v)} \\frac{1}{\\log |\\Gamma(w)|}\n\nwhere $\\Gamma(u)$ denotes the set of neighbors of $u$.\nThis index leads to zero-division for nodes only connected via self-loops.\nIt is intended to be used when no self-loops are present.\n\nParameters\n----------\nG : graph\n    NetworkX undirected graph.\n\nebunch : iterable of node pairs, optional (default = None)\n    Adamic-Adar index will be computed for each pair of nodes given\n    in the iterable. The pairs must be given as 2-tuples (u, v)\n    where u and v are nodes in the graph. If ebunch is None then all\n    nonexistent edges in the graph will be used.\n    Default value: None.\n\nReturns\n-------\npiter : iterator\n    An iterator of 3-tuples in the form (u, v, p) where (u, v) is a\n    pair of nodes and p is their Adamic-Adar index.\n\nRaises\n------\nNetworkXNotImplemented\n    If `G` is a `DiGraph`, a `Multigraph` or a `MultiDiGraph`.\n\nNodeNotFound\n    If `ebunch` has a node that is not in `G`.\n\nExamples\n--------\n>>> G = nx.complete_graph(5)\n>>> preds = nx.adamic_adar_index(G, [(0, 1), (2, 3)])\n>>> for u, v, p in preds:\n...     print(f\"({u}, {v}) -> {p:.8f}\")\n(0, 1) -> 2.16404256\n(2, 3) -> 2.16404256\n\nReferences\n----------\n.. [1] D. Liben-Nowell, J. Kleinberg.\n       The Link Prediction Problem for Social Networks (2004).\n       http://www.cs.cornell.edu/home/kleinber/link-pred.pdf"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: ebunch
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.algorithms.link_prediction import adamic_adar_index\n\nresult = adamic_adar_index(\n    G=None  # TODO,\n    ebunch=None,\n)\n"
