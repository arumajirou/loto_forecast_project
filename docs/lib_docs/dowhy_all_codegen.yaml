    module: dowhy.utils.plotting
    library: dowhy
    top_group: dowhy.utils
    role: visualize
    name_cluster: 249
    event_like: False
    return_type: None
    docstring: "Convenience function to plot causal graphs. This function uses different backends based on what's\navailable on the system. The best result is achieved when using Graphviz as the backend. This requires both\nthe shared system library (e.g. ``brew install graphviz`` or ``apt-get install graphviz``) and the Python pygraphviz\npackage (``pip install pygraphviz``). When graphviz is not available, it will fall back to the networkx backend.\n\n:param causal_graph: The graph to be plotted\n:param layout_prog: Defines the layout type. If None is given, the 'dot' layout is used for graphviz plots and a\n                    customized layout for networkx plots.\n:param causal_strengths: An optional dictionary with Edge -> float entries.\n:param colors: An optional dictionary with color specifications for edges or nodes.\n:param filename: An optional filename if the output should be plotted into a file.\n:param display_plot: Optionally specify if the plot should be displayed or not (default to True).\n:param figure_size: A tuple to define the width and height (as a tuple) of the pyplot. This is used to parameter to\n                    modify pyplot's 'figure.figsize' parameter. If None is given, the current/default value is used.\n:param kwargs: Remaining parameters will be passed through to the backend verbatim.\n\n**Example usage**::\n\n>>> plot(nx.DiGraph([('X', 'Y')])) # plots X -> Y\n>>> plot(nx.DiGraph([('X', 'Y')]), causal_strengths={('X', 'Y'): 0.43}) # annotates arrow with 0.43\n>>> plot(nx.DiGraph([('X', 'Y')]), colors={('X', 'Y'): 'red', 'X': 'green'}) # colors X -> Y red and X green"
    params:
      -
        name: causal_graph
        kind: POSITIONAL_OR_KEYWORD
        annotation: nx.Graph
        has_default: false
        default_repr: ""
      -
        name: layout_prog
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
        default_repr: None
      -
        name: causal_strengths
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Dict[Tuple[Any, Any], float]]"
        has_default: true
        default_repr: None
      -
        name: colors
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Dict[Union[Any, Tuple[Any, Any]], str]]"
        has_default: true
        default_repr: None
      -
        name: filename
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
        default_repr: None
      -
        name: display_plot
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: figure_size
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Tuple[int, int]]"
        has_default: true
