    module: networkx.classes.digraph
    library: networkx
    top_group: networkx.classes
    role: other
    name_cluster: 139
    event_like: False
    return_type: ""
    docstring: "Add all the edges in ebunch_to_add.\n\nParameters\n----------\nebunch_to_add : container of edges\n    Each edge given in the container will be added to the\n    graph. The edges must be given as 2-tuples (u, v) or\n    3-tuples (u, v, d) where d is a dictionary containing edge data.\nattr : keyword arguments, optional\n    Edge data (or labels or objects) can be assigned using\n    keyword arguments.\n\nSee Also\n--------\nadd_edge : add a single edge\nadd_weighted_edges_from : convenient way to add weighted edges\n\nNotes\n-----\nAdding the same edge twice has no effect but any edge data\nwill be updated when each duplicate edge is added.\n\nEdge attributes specified in an ebunch take precedence over\nattributes specified via keyword arguments.\n\nWhen adding edges from an iterator over the graph you are changing,\na `RuntimeError` can be raised with message:\n`RuntimeError: dictionary changed size during iteration`. This\nhappens when the graph's underlying dictionary is modified during\niteration. To avoid this error, evaluate the iterator into a separate\nobject, e.g. by using `list(iterator_of_edges)`, and pass this\nobject to `G.add_edges_from`.\n\nExamples\n--------\n>>> G = nx.Graph()  # or DiGraph, MultiGraph, MultiDiGraph, etc\n>>> G.add_edges_from([(0, 1), (1, 2)])  # using a list of edge tuples\n>>> e = zip(range(0, 3), range(1, 4))\n>>> G.add_edges_from(e)  # Add the path graph 0-1-2-3\n\nAssociate data to edges\n\n>>> G.add_edges_from([(1, 2), (2, 3)], weight=3)\n>>> G.add_edges_from([(3, 4), (1, 4)], label=\"WN2898\")\n\nEvaluate an iterator over a graph if using it to modify the same graph\n\n>>> G = nx.DiGraph([(1, 2), (2, 3), (3, 4)])\n>>> # Grow graph by one new node, adding edges to all existing nodes.\n>>> # wrong way - will raise RuntimeError\n>>> # G.add_edges_from(((5, n) for n in G.nodes))\n>>> # right way - note that there will be no self-edge for node 5\n>>> G.add_edges_from(list((5, n) for n in G.nodes))"
    params:
      -
        name: self
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: ebunch_to_add
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: attr
        kind: VAR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.classes.digraph import DiGraph\n\nobj = DiGraph()  # TODO: __init__ args\n\nresult = obj.add_edges_from(\n    ebunch_to_add=None  # TODO,\n)\n"
