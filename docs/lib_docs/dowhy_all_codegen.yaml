    name_cluster: 161
    event_like: False
    return_type: "Dict[Any, float]"
    docstring: "Given newly observed and original samples from the joint distribution of the given causal graphical model, this\nmethod estimates a score for each node that quantifies how much the distribution of the node has changed. For this,\nit first checks whether the underlying causal mechanism has changed at all and, if this is the case, it estimates\nthe difference between the new and original distributions. The score is based on the quantity measured by the\nprovided difference_estimation_func or 0 if no mechanism change has been detected.\n\nNote that for each parent sample, num_joint_samples conditional samples are generated based on the original and new\ncausal mechanism and evaluated by the given difference_estimation_func function. These results are then averaged\nover multiple different parent samples.\n\n:param causal_model: The underlying causal model based on the original data.\n:param original_data: Samples from the original data.\n:param new_data: Samples from the new data.\n:param difference_estimation_func: Function for quantifying the distribution change. This function should expect\n                                   two inputs which represent samples from two different distributions. An example\n                                   could be the KL divergence.\n:param max_num_evaluation_samples: Maximum number of (parent) samples for evaluating the difference in\n                                   distributions.\n:param num_joint_samples: Number of samples generated in a node per parent sample.\n:param early_stopping_percentage: If the change in percentage between multiple consecutive runs is below this\n                                  threshold, the evaluation stops before evaluating all max_num_evaluation_samples.\n:param independence_test: Unconditional independence test. This is used to identify mechanism changes in root nodes.\n:param conditional_independence_test: Conditional independence test. This is used to identify mechanism changes in\n                                      non-root nodes.\n:param mechanism_change_test_significance_level: A significance level for rejecting the null hypothesis that the\n                                                 causal mechanism of a node has not changed.\n:param mechanism_change_test_fdr_control_method: The false discovery rate control method for mechanism change\n                                                 tests. For more options, checkout `statsmodels manual\n                                                 <https://www.statsmodels.org/dev/generated/statsmodels.stats.multitest.multipletests.html>`_.\n:return: A dictionary assining a score to each node in the causal graph."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: ProbabilisticCausalModel
        has_default: false
        default_repr: ""
      -
        name: original_data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: new_data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: difference_estimation_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], Union[np.ndarray, float]]"
        has_default: true
        default_repr: auto_estimate_kl_divergence
      -
        name: max_num_evaluation_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 1000
      -
        name: num_joint_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 500
      -
        name: early_stopping_percentage
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.01
      -
        name: independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: conditional_independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: mechanism_change_test_significance_level
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.05
      -
        name: mechanism_change_test_fdr_control_method
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
