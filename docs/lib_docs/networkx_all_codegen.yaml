    docstring: "Decorator to ensure clean opening and closing of files.\n\nParameters\n----------\npath_arg : string or int\n    Name or index of the argument that is a path.\n\nmode : str\n    String for opening mode.\n\nReturns\n-------\n_open_file : function\n    Function which cleanly executes the io.\n\nExamples\n--------\nDecorate functions like this::\n\n   @open_file(0, \"r\")\n   def read_function(pathname):\n       pass\n\n\n   @open_file(1, \"w\")\n   def write_function(G, pathname):\n       pass\n\n\n   @open_file(1, \"w\")\n   def write_function(G, pathname=\"graph.dot\"):\n       pass\n\n\n   @open_file(\"pathname\", \"w\")\n   def write_function(G, pathname=\"graph.dot\"):\n       pass\n\n\n   @open_file(\"path\", \"w+\")\n   def another_function(arg, **kwargs):\n       path = kwargs[\"path\"]\n       pass\n\nNotes\n-----\nNote that this decorator solves the problem when a path argument is\nspecified as a string, but it does not handle the situation when the\nfunction wants to accept a default of None (and then handle it).\n\nHere is an example of how to handle this case::\n\n  @open_file(\"path\")\n  def some_function(arg1, arg2, path=None):\n      if path is None:\n          fobj = tempfile.NamedTemporaryFile(delete=False)\n      else:\n          # `path` could have been a string or file object or something\n          # similar. In any event, the decorator has given us a file object\n          # and it will close it for us, if it should.\n          fobj = path\n\n      try:\n          fobj.write(\"blah\")\n      finally:\n          if path is None:\n              fobj.close()\n\nNormally, we'd want to use \"with\" to ensure that fobj gets closed.\nHowever, the decorator will make `path` a file object for us,\nand using \"with\" would undesirably close that file object.\nInstead, we use a try block, as shown above.\nWhen we exit the function, fobj will be closed, if it should be, by the decorator."
    params:
      -
        name: path_arg
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: mode
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: "'r'"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.utils.decorators import open_file\n\nresult = open_file(\n    path_arg=None  # TODO,\n    mode='r',\n)\n"
