        kind: POSITIONAL_OR_KEYWORD
        annotation: InferenceDataT
        has_default: false
        default_repr: ""
      -
        name: groups
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Union[str, List[str]]]"
        has_default: true
