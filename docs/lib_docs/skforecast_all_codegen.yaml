    name_cluster: 22
    event_like: False
    return_type: nan
    docstring: "A class to detect population drift between reference and new datasets.\n\nThis implementation computes Kolmogorov-Smirnov (KS) test for numeric features,\nChi-Square test for categorical features, and Jensen-Shannon (JS) distance\nfor all features. It calculates empirical distributions of these statistics\nfrom the reference data and uses quantile thresholds to determine drift in\nnew data.\n\nUnlike fixed statistical cutoffs, all drift thresholds are calibrated from\nthe reference data itself, allowing the detector to adapt to the natural\nvariability of each feature.\n\nThis implementation is inspired by NannyML's DriftDetector. See Notes for\ndetails.\n\nFor an in-depth explanation of the underlying calculations, see \nhttps://skforecast.org/latest/user_guides/drift-detection.html#deep-dive-into-temporal-drift-detection-in-time-series\n\nParameters\n----------\nchunk_size : int, str, default None\n    Size of chunks for sequential drift analysis.\n\n    - If int, it represents the number of observations per chunk.\n    - If str (e.g., 'D', 'W', 'MS'), it defines time-based chunks assuming a\n    datetime index.\n    - If None, the entire dataset is analyzed as a single chunk.\nthreshold : int, float, default 3\n    Threshold for KS, Chi2, and JS statistics. Interpretation depends on\n    `threshold_method`:\n    \n    - If `threshold_method='std'`, `threshold` is interpreted as a multiplier\n    of the standard deviation, and thresholds are computed as:\n    `mean + threshold * std`.\n    - If `threshold_method='quantile'`, `threshold` represents the quantile\n    level (between 0 and 1) used to compute the empirical threshold.\nthreshold_method : str, default 'std'\n    Strategy used to estimate `threshold` from empirical distributions \n    computed on the reference data:\n    \n    - `'std'`: Thresholds are estimated as a function of the mean and\n    standard deviation of the empirical distribution (`mean + threshold * std`). \n    This approach is computationally efficient, as it does not rely on \n    leave-one-chunk-out procedures.\n    - `'quantile'`: Thresholds are derived from a specified quantile of the\n    empirical distribution using leave-one-chunk-out cross-validation to\n    avoid self-comparison bias. This is statistically more correct for\n    quantile-based thresholds but computationally more expensive.\nmax_out_of_range_proportion : float, default 0.1\n    Maximum allowed proportion of observations outside the reference value\n    range for numeric features.\n    If the proportion of out-of-range observations in a new data chunk\n    exceeds this value, drift is flagged for the corresponding feature.\n    This parameter must be between 0 and 1.\n\nAttributes\n----------\nchunk_size : int, str\n    Size of chunks for sequential drift analysis.\nthreshold : float\n    Threshold for KS, Chi2, and JS statistics. Interpretation depends on\n    `threshold_method`.\nthreshold_method : str\n    Method for calculating `threshold` ('quantile' or 'std').\nmax_out_of_range_proportion : float\n    Proportion threshold for out-of-range observations (numeric features).\nis_fitted : bool\n    Indicates if the detector has been fitted with reference data.\nref_features_ : list\n    List of features in the reference data.\nempirical_dist_ks_ : dict\n    Empirical distributions of KS test statistics for each numeric feature in\n    reference data.\nempirical_dist_chi2_ : dict\n    Empirical distributions of Chi-Square test statistics for each categorical\n    feature in reference data.\nempirical_dist_js_ : dict\n    Empirical distributions of Jensen-Shannon distance for each feature in\n    reference data (numeric and categorical).\nempirical_threshold_ks_ : dict\n    Computed thresholds for KS statistics based on empirical distributions \n    for each numeric feature in reference data.\nempirical_threshold_chi2_ : dict\n    Computed thresholds for Chi-Square statistics based on empirical \n    distributions for each categorical feature in reference data.\nempirical_threshold_js_ : dict\n    Computed thresholds for Jensen-Shannon distance based on empirical \n    distributions for each feature in reference data (numeric and categorical).\nn_chunks_reference_data_ : int\n    Number of chunks in reference data used during fitting to compute\n    empirical distributions.\nref_ecdf_ : dict\n    Precomputed ECDFs for numeric features in the reference data.\nref_bins_edges_ : dict\n    Precomputed histogram bin edges for numeric features in the reference data.\nref_hist_ : dict\n    Precomputed histograms for numeric features in the reference data.\nref_probs_ : dict\n    Precomputed normalized value counts (probabilities) for each category of\n    categorical features in the reference data.\nref_ranges_ : dict\n    Min and max values for numeric features in the reference data.\nref_categories_ : dict\n    Unique categories for categorical features in the reference data.\ndetectors_ : dict\n    Dictionary of PopulationDriftDetector instances for each group when\n    fitting/predicting on MultiIndex DataFrames.\nseries_names_in_ : list\n    List of series IDs present during fitting when using MultiIndex DataFrames.\nskforecast_version : str\n    Version of skforecast library used to create the detector.\n\nNotes\n-----\nThis implementation is inspired by NannyML's DriftDetector [1]_.\n\nIt is a lightweight version adapted for skforecast's needs:\n- It does not store the raw reference data, only the necessary precomputed\ninformation to calculate the statistics efficiently during prediction.\n- All empirical thresholds are calculated using the specified quantile from\nthe empirical distributions obtained from the reference data chunks.\n- It includes checks for out of range values in numeric features and new\ncategories in categorical features.\n- It supports multiple time series by fitting separate detectors for each\nseries ID when provided with a MultiIndex DataFrame.\n\nFor advanced features (multivariate drift, data quality checks), consider\nusing NannyML directly: https://nannyml.readthedocs.io/en/stable/\n\nReferences\n----------\n.. [1] NannyML API Reference.\n       https://nannyml.readthedocs.io/en/stable/tutorials/detecting_data_drift/univariate_drift_detection.html"
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom skforecast.drift_detection._population_drift import PopulationDriftDetector\n\nobj = PopulationDriftDetector(\n    chunk_size=None,\n    threshold=3,\n    threshold_method='std',\n    max_out_of_range_proportion=0.1,\n)\n"
