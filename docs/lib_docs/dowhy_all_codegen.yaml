        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
        name: conditional_sampling_method
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray], np.ndarray]"
        has_default: false
        default_repr: ""
      -
        name: num_conditional_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 100
      -
        name: normalize
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.model_evaluation import crps\n\nresult = crps(\n    X=None  # TODO: np.ndarray,\n    Y=None  # TODO: np.ndarray,\n    conditional_sampling_method=None  # TODO: Callable[[np.ndarray], np.ndarray],\n    num_conditional_samples=100,\n    normalize=True,\n)\n"
