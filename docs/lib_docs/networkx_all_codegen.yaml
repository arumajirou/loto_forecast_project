    docstring: "Returns the algebraic connectivity of an undirected graph.\n\nThe algebraic connectivity of a connected undirected graph is the second\nsmallest eigenvalue of its Laplacian matrix.\n\nParameters\n----------\nG : NetworkX graph\n    An undirected graph.\n\nweight : object, optional (default: None)\n    The data key used to determine the weight of each edge. If None, then\n    each edge has unit weight.\n\nnormalized : bool, optional (default: False)\n    Whether the normalized Laplacian matrix is used.\n\ntol : float, optional (default: 1e-8)\n    Tolerance of relative residual in eigenvalue computation.\n\nmethod : string, optional (default: 'tracemin_pcg')\n    Method of eigenvalue computation. It must be one of the tracemin\n    options shown below (TraceMIN), 'lanczos' (Lanczos iteration)\n    or 'lobpcg' (LOBPCG).\n\n    The TraceMIN algorithm uses a linear system solver. The following\n    values allow specifying the solver to be used.\n\n    =============== ========================================\n    Value           Solver\n    =============== ========================================\n    'tracemin_pcg'  Preconditioned conjugate gradient method\n    'tracemin_lu'   LU factorization\n    =============== ========================================\n\nseed : integer, random_state, or None (default)\n    Indicator of random number generation state.\n    See :ref:`Randomness<randomness>`.\n\nReturns\n-------\nalgebraic_connectivity : float\n    Algebraic connectivity.\n\nRaises\n------\nNetworkXNotImplemented\n    If G is directed.\n\nNetworkXError\n    If G has less than two nodes.\n\nNotes\n-----\nEdge weights are interpreted by their absolute values. For MultiGraph's,\nweights of parallel edges are summed. Zero-weighted edges are ignored.\n\nSee Also\n--------\nlaplacian_matrix\n\nExamples\n--------\nFor undirected graphs algebraic connectivity can tell us if a graph is connected or not\n`G` is connected iff  ``algebraic_connectivity(G) > 0``:\n\n>>> G = nx.complete_graph(5)\n>>> nx.algebraic_connectivity(G) > 0\nTrue\n>>> G.add_node(10)  # G is no longer connected\n>>> nx.algebraic_connectivity(G) > 0\nFalse"
