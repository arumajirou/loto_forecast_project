        has_default: true
        default_repr: None
      -
        name: long_sample_behaviour
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: true
        default_repr: "'average+warn'"
      -
        name: open_ai_batch_size
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 500
