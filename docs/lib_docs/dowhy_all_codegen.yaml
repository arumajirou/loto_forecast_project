    role: other
    name_cluster: 87
    event_like: False
    return_type: np.ndarray
    docstring: "Estimates the contributions of the features for each sample in anomaly_samples to the anomaly score obtained\nby the anomaly_scoring_func. If attribute_mean_deviation is set to False, the anomaly score is based on the\ninformation theoretic (IT) score -log(P(g(X) >= g(x))), where g is the anomaly_scoring_func, X samples from the\nmarginal distribution of the target_node and x an observation of the target_node in anomaly_samples. If\nattribute_mean_deviation is set to True, the contribution to g(x) - E[g(X)] is estimated instead, i.e. the\nfeature relevance for the given scorer.\n\nNote that the anomaly scoring function needs to handle the dimension and modality of the data. An example for a\nfunction for multidimensional continues data would be:\n    density_estimator = GaussianMixtureDensityEstimator()\n    density_estimator.fit(original_observations)\n    anomaly_scoring_func = lambda x, y: estimate_inverse_density_score(x, y, density_estimator)\n\nRelated paper:\nJanzing, D., Budhathoki, K., Minorics, L., & Bloebaum, P. (2022).\nCausal structure based root cause analysis of outliers\nhttps://arxiv.org/abs/1912.02724\n\n:param anomaly_samples: Samples x for which the contributions are estimated. The dimensionality of these samples\n                        doesn't matter as long as the anomaly_scoring_func supports it.\n:param distribution_samples: Samples from the (non-anomalous) distribution X.\n:param anomaly_scoring_func: A function g that takes a sample from X as input and returns an anomaly score.\n:param attribute_mean_deviation: If set to False, the contribution is estimated based on the IT score and if it is\n                                 set to True, the contribution is based on the feature relevance with respect to the\n                                 given scoring function.\n:param shapley_config: :class:`~dowhy.gcm.shapley.ShapleyConfig` for the Shapley estimator.\n:return: A numpy array with the feature contributions to the anomaly score for each sample in anomaly_samples."
    params:
      -
        name: anomaly_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
        name: distribution_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
        name: anomaly_scoring_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray], np.ndarray]"
        has_default: false
        default_repr: ""
      -
        name: attribute_mean_deviation
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: false
