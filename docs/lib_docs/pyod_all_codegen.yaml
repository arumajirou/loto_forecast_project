    docstring: "Wrapper of scikit-learn one-class SVM Class with more functionalities.\nUnsupervised Outlier Detection.\n\nEstimate the support of a high-dimensional distribution.\n\nThe implementation is based on libsvm.\nSee http://scikit-learn.org/stable/modules/svm.html#svm-outlier-detection\nand :cite:`scholkopf2001estimating`.\n\nParameters\n----------\nkernel : string, optional (default='rbf')\n     Specifies the kernel type to be used in the algorithm.\n     It must be one of 'linear', 'poly', 'rbf', 'sigmoid', 'precomputed' or\n     a callable.\n     If none is given, 'rbf' will be used. If a callable is given it is\n     used to precompute the kernel matrix.\n\nnu : float, optional\n    An upper bound on the fraction of training\n    errors and a lower bound of the fraction of support\n    vectors. Should be in the interval (0, 1]. By default 0.5\n    will be taken.\n\ndegree : int, optional (default=3)\n    Degree of the polynomial kernel function ('poly').\n    Ignored by all other kernels.\n\ngamma : float, optional (default='auto')\n    Kernel coefficient for 'rbf', 'poly' and 'sigmoid'.\n    If gamma is 'auto' then 1/n_features will be used instead.\n\ncoef0 : float, optional (default=0.0)\n    Independent term in kernel function.\n    It is only significant in 'poly' and 'sigmoid'.\n\ntol : float, optional\n    Tolerance for stopping criterion.\n\nshrinking : bool, optional\n    Whether to use the shrinking heuristic.\n\ncache_size : float, optional\n    Specify the size of the kernel cache (in MB).\n\nverbose : bool, default: False\n    Enable verbose output. Note that this setting takes advantage of a\n    per-process runtime setting in libsvm that, if enabled, may not work\n    properly in a multithreaded context.\n\nmax_iter : int, optional (default=-1)\n    Hard limit on iterations within solver, or -1 for no limit.\n\ncontamination : float in (0., 0.5), optional (default=0.1)\n    The amount of contamination of the data set, i.e.\n    the proportion of outliers in the data set. Used when fitting to\n    define the threshold on the decision function.\n\n\nAttributes\n----------\nsupport_ : array-like, shape = [n_SV]\n    Indices of support vectors.\n\nsupport_vectors_ : array-like, shape = [nSV, n_features]\n    Support vectors.\n\ndual_coef_ : array, shape = [1, n_SV]\n    Coefficients of the support vectors in the decision function.\n\ncoef_ : array, shape = [1, n_features]\n    Weights assigned to the features (coefficients in the primal\n    problem). This is only available in the case of a linear kernel.\n\n    `coef_` is readonly property derived from `dual_coef_` and\n    `support_vectors_`\n\nintercept_ : array, shape = [1,]\n    Constant in the decision function.\n\ndecision_scores_ : numpy array of shape (n_samples,)\n    The outlier scores of the training data.\n    The higher, the more abnormal. Outliers tend to have higher\n    scores. This value is available once the detector is fitted.\n\nthreshold_ : float\n    The threshold is based on ``contamination``. It is the\n    ``n_samples * contamination`` most abnormal samples in\n    ``decision_scores_``. The threshold is calculated for generating\n    binary outlier labels.\n\nlabels_ : int, either 0 or 1\n    The binary labels of the training data. 0 stands for inliers\n    and 1 for outliers/anomalies. It is generated by applying\n    ``threshold_`` on ``decision_scores_``."
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom pyod.models.ocsvm import OCSVM\n\nobj = OCSVM(\n    kernel='rbf',\n    degree=3,\n    gamma='auto',\n    coef0=0.0,\n    tol=0.001,\n    nu=0.5,\n    shrinking=True,\n    cache_size=200,\n    verbose=False,\n    max_iter=-1,\n    contamination=0.1,\n)\n"
