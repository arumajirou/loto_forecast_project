    docstring: "Validates the assumptions in a causal graph against data. To this end, at each node, we test if the node is dependent on each of its parents, and test the local Markov condition.\nNote that valid local Markov conditions also imply a valid global Markov condition.\n\n:param causal_graph: A directed acyclic graph (DAG).\n:param data: Observations of variables in the DAG.\n:param independence_test: Independence test to use for checking edge dependencies.\n:param conditional_independence_test: Conditional independence test to use for checking local Markov condition.\n:param significance_level: Significance level for (conditional) independence tests.\n:param fdr_control_method: Method for false discovery rate (FDR) control. For various options, please refer to `this page <https://www.statsmodels.org/dev/generated/statsmodels.stats.multitest.multipletests.html>`_.\n:return: Outcome of the validation process. The first element of the tuple indicates whether the graph is valid w.r.t. given data, and the second element gives the summary of tests at each node. An example for X->Y->Z:\n\n.. code-block:: python\n\n    [True, {'X': {'local_markov_test': {}, 'edge_dependence_test': {}},\n            'Y': {'local_markov_test': {}, 'edge_dependence_test': {'X': {'p_value': 0.5, 'fdr_adjusted_p_value': 0.5, 'success': True}}},\n            'Z': {'local_markov_test': {'p_value': 0.0, 'fdr_adjusted_p_value': 0.5, 'success': False},\n                  'edge_dependence_test': {'Y': {'p_value': 0.5, 'fdr_adjusted_p_value': 0.5, 'success': True}}}}]"
    params:
      -
        name: causal_graph
        kind: POSITIONAL_OR_KEYWORD
        annotation: DirectedGraph
        has_default: false
        default_repr: ""
      -
        name: data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: conditional_independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: significance_level
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.05
      -
        name: fdr_control_method
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
        default_repr: "'fdr_bh'"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.validation import refute_causal_structure\n\nresult = refute_causal_structure(\n    causal_graph=None  # TODO: DirectedGraph,\n    data=None  # TODO: pd.DataFrame,\n    independence_test=kernel_based,\n    conditional_independence_test=kernel_based,\n    significance_level=0.05,\n    fdr_control_method='fdr_bh',\n)\n"
