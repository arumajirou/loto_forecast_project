    docstring: "QuantileBinner class to bin data into quantile-based bins using `numpy.percentile`.\nThis class is similar to `KBinsDiscretizer` but optimized for performance using\n`numpy.searchsorted` for fast bin assignment. Bin intervals are defined following \nthe convention: bins[i-1] <= x < bins[i]. Values outside the range are clipped\nto the first or last bin. See more information in `numpy.percentile` and\n`numpy.searchsorted`.\n\nParameters\n----------\nn_bins : int\n    The number of quantile-based bins to create.\nmethod : str, default 'linear'\n    The method used to compute the quantiles. This parameter is passed to \n    `numpy.percentile`. Default is 'linear'. Valid values are \"inverse_cdf\",\n    \"averaged_inverse_cdf\", \"closest_observation\", \"interpolated_inverse_cdf\",\n    \"hazen\", \"weibull\", \"linear\", \"median_unbiased\", \"normal_unbiased\".\nsubsample : int, default 200000\n    The number of samples to use for computing quantiles. If the dataset \n    has more samples than `subsample`, a random subset will be used.\ndtype : data type, default numpy.float64\n    The data type to use for the bin indices. Default is `numpy.float64`.\nrandom_state : int, default 789654\n    The random seed to use for generating a random subset of the data.\n\nAttributes\n----------\nn_bins : int\n    The number of quantile-based bins to create.\nmethod : str\n    The method used to compute the quantiles. This parameter is passed to \n    `numpy.percentile`. Default is 'linear'. Valid values are 'linear',\n    'lower', 'higher', 'midpoint', 'nearest'.\nsubsample : int\n    The number of samples to use for computing quantiles. If the dataset \n    has more samples than `subsample`, a random subset will be used.\ndtype : data type\n    The data type to use for the bin indices. Default is `numpy.float64`.\nrandom_state : int\n    The random seed to use for generating a random subset of the data.\nn_bins_ : int\n    The number of bins learned during fitting. This may be less than `n_bins` \n    if there are duplicate bin edges due to repeated predicted values.\nbin_edges_ : numpy ndarray\n    The edges of the bins learned during fitting.\ninternal_edges_ : numpy ndarray\n    The internal edges used for optimized bin assignment using `numpy.searchsorted`.\nintervals_ : dict\n    A dictionary with the bin indices as keys and the corresponding bin\n    intervals as values."
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom skforecast.preprocessing.preprocessing import QuantileBinner\n\nobj = QuantileBinner(\n    n_bins=None  # TODO: int,\n    method='linear',\n    subsample=200000,\n    dtype=<class 'numpy.float64'>,\n    random_state=789654,\n)\n"
