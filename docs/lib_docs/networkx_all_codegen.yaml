        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: weight
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: "'weight'"
