    role: other
    name_cluster: 64
    event_like: False
    return_type: float
    docstring: "Estimates the average causal effect (ACE) on the target of two different sets of interventions.\nThe interventions can be specified through the parameters `interventions_alternative` and `interventions_reference`.\nFor example, if the alternative intervention is do(T := 1) and the reference intervention\nis do(T := 0), then the average causal effect is given by ACE = E[Y | do(T := 1)] - E[Y | do(T := 0)]:\n    >>> average_causal_effect(causal_model, 'Y', {'T': lambda _ : 1}, {'T': lambda _ : 0})\n\nWe can also specify more complex interventions on multiple nodes:\n    >>> average_causal_effect(causal_model,\n    >>>                       'Y',\n    >>>                       {'T': lambda _ : 1, 'X0': lambda x : x + 1},\n    >>>                       {'T': lambda _ : 0, 'X0': lambda x : x * 2})\nIn the above, we would estimate ACE = E[Y | do(T := 1), do(X0 := X0 + 1)] - E[Y | do(T := 0), do(X0 := X0 * 2)].\n\nNote: The target node can be a continuous real-valued variable or a categorical variable with at most two classes\n(i.e. binary).\n\n:param causal_model: The probabilistic causal model we perform this intervention on .\n:param target_node: Target node for which the ACE is estimated.\n:param interventions_alternative: Dictionary defining the interventions for the alternative values.\n:param interventions_reference: Dictionary defining the interventions for the reference values.\n:param observed_data: Factual data that we observe for the nodes in the causal graph. By default, new data\n                      is sampled using the causal model. If observational data is available, providing them\n                      might improve the accuracy by mitigating issues due to a misspecified graph and/or causal\n                      models.\n:param num_samples_to_draw: Number of samples drawn from the causal model for estimating ACE if no observed data is\n                            given.\n:return: The estimated average causal effect (ACE)."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: ProbabilisticCausalModel
        has_default: false
        default_repr: ""
      -
        name: target_node
        kind: POSITIONAL_OR_KEYWORD
        annotation: Any
        has_default: false
        default_repr: ""
      -
        name: interventions_alternative
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Dict[Any, Callable[[np.ndarray], Union[float, np.ndarray]]]"
        has_default: false
        default_repr: ""
      -
        name: interventions_reference
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Dict[Any, Callable[[np.ndarray], Union[float, np.ndarray]]]"
        has_default: false
        default_repr: ""
      -
        name: observed_data
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[pd.DataFrame]"
        has_default: true
        default_repr: None
      -
        name: num_samples_to_draw
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[int]"
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.whatif import average_causal_effect\n\nresult = average_causal_effect(\n    causal_model=None  # TODO: ProbabilisticCausalModel,\n    target_node=None  # TODO: Any,\n    interventions_alternative=None  # TODO: Dict[Any, Callable[[np.ndarray], Union[float, np.ndarray]]],\n    interventions_reference=None  # TODO: Dict[Any, Callable[[np.ndarray], Union[float, np.ndarray]]],\n    observed_data=None,\n    num_samples_to_draw=None,\n)\n"
