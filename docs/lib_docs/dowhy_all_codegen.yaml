    type: function
    name: evaluate_causal_model
    path: dowhy.gcm.model_evaluation.evaluate_causal_model
    module: dowhy.gcm.model_evaluation
    library: dowhy
    top_group: dowhy.gcm
    role: evaluate
    name_cluster: 114
    event_like: False
    return_type: CausalModelEvaluationResult
    docstring: "Evaluates the given causal model by running different evaluations.\n\nEvaluation of Causal Mechanisms:\nThe quality of the causal mechanisms is assessed using k-fold cross validation. This means that the models are trained\nfrom scratch multiple times, which might take a significant amount of time for larger models. Within each fold, the models\nare assessed by different metrics. For all models, the continuous ranked probability score (CRPS) normalized by the\nstandard deviation is estimated, an important metric that provides insights to the model performance as well as its\ncalibration. Further, if the node is numerical, the mean squared error (MSE), the normalized MSE (normalized by\nthe variance) and the R2 coefficient is computed. In case of categorical nodes, the F1 score is computed instead.\nOptionally, the mechanisms' CRPS are compared with baseline models to see if there are baseline models performing significantly better.\n\nEvaluation of Invertible Functional Causal Model Assumption:\nInvertible causal mechanisms rely on the assumption that the inputs are independent of the reconstructed noise.\nThis is, assuming there are no hidden confounders, the noise should be independent of parents of a node. This\ncan be evaluated by testing statistical independence between the reconstructed noise and the used input samples.\n\nEvaluation of Generated Distribution:\nThe distribution generated by the causal model is compared with the observed data using KL divergence. To avoid\nestimating the KL divergence of high-dimensional data, we approximate it by calculating the mean KL divergence\nacross the individual marginal KL divergences for each node.\n\nEvaluation of the Causal Graph Structure:\nThe causal graph structure is evaluated by running a method to falsify the graph. The method involves conducting\nindependence tests and may consume a significant amount of time for more extensive graphs. The results provide\nan indication of whether the graph is rejected or not. It's important to note that a non-rejected graph does not\nguarantee its correctness. It simply means that the evaluation did not find substantial evidence to refute the causal\ngraph based on the provided data. However, a rejected graph might indicate potential issues with its structure.\n\nThe outcomes of these evaluation methods should be interpreted with caution, and bad fits should not be\nover-interpreted. Nonetheless, the results can offer insights into the performance of the causal model and potential\nareas for improvement.\n\n:param causal_model: The causal model to evaluate.\n:param data: The data used for the evaluation.\n:param max_num_samples: The maximum number of samples used for the evaluation. If the runtime is too slow, consider\n                        setting this to a smaller value. The default -1 indicates that all samples are used.\n:param evaluate_causal_mechanisms: If True, the causal mechanisms are evaluated.\n:param compare_mechanism_baselines: If True, the causal mechanisms are compared with baseline models to see\n                                    if there are model choices that perform significantly better. If False, this\n                                    comparison is skipped. This is ignored if evaluate_causal_mechanisms is False.\n:param evaluate_invertibility_assumptions: If True, the model assumption represented by invertible causal mechanisms\n                                           is tested.\n:param evaluate_overall_kl_divergence: If True, the KL divergence between the generated and the observed data is\n                                       estimated.\n:param evaluate_causal_structure: If True, the causal graph structure is evaluated.\n:return: A summary of the evaluation."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: ProbabilisticCausalModel
        has_default: false
        default_repr: ""
      -
        name: data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: max_num_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: -1
      -
        name: evaluate_causal_mechanisms
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: compare_mechanism_baselines
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: False
      -
        name: evaluate_invertibility_assumptions
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: evaluate_overall_kl_divergence
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: evaluate_causal_structure
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: config
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[EvaluateCausalModelConfig]"
