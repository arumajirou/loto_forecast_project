    docstring: "Display a widget that returns pictures from the user's webcam.\n\nParameters\n----------\nlabel : str\n    A short label explaining to the user what this widget is used for.\n    The label can optionally contain GitHub-flavored Markdown of the\n    following types: Bold, Italics, Strikethroughs, Inline Code, Links,\n    and Images. Images display like icons, with a max height equal to\n    the font height.\n\n    Unsupported Markdown elements are unwrapped so only their children\n    (text contents) render. Display unsupported elements as literal\n    characters by backslash-escaping them. E.g.,\n    ``\"1\\. Not an ordered list\"``.\n\n    See the ``body`` parameter of |st.markdown|_ for additional,\n    supported Markdown directives.\n\n    For accessibility reasons, you should never set an empty label, but\n    you can hide it with ``label_visibility`` if needed. In the future,\n    we may disallow empty labels by raising an exception.\n\n    .. |st.markdown| replace:: ``st.markdown``\n    .. _st.markdown: https://docs.streamlit.io/develop/api-reference/text/st.markdown\n\nkey : str or int\n    An optional string or integer to use as the unique key for the widget.\n    If this is omitted, a key will be generated for the widget\n    based on its content. No two widgets may have the same key.\n\nhelp : str or None\n    A tooltip that gets displayed next to the widget label. Streamlit\n    only displays the tooltip when ``label_visibility=\"visible\"``. If\n    this is ``None`` (default), no tooltip is displayed.\n\n    The tooltip can optionally contain GitHub-flavored Markdown,\n    including the Markdown directives described in the ``body``\n    parameter of ``st.markdown``.\n\non_change : callable\n    An optional callback invoked when this camera_input's value\n    changes.\n\nargs : list or tuple\n    An optional list or tuple of args to pass to the callback.\n\nkwargs : dict\n    An optional dict of kwargs to pass to the callback.\n\ndisabled : bool\n    An optional boolean that disables the camera input if set to\n    ``True``. Default is ``False``.\n\nlabel_visibility : \"visible\", \"hidden\", or \"collapsed\"\n    The visibility of the label. The default is ``\"visible\"``. If this\n    is ``\"hidden\"``, Streamlit displays an empty spacer instead of the\n    label, which can help keep the widget aligned with other widgets.\n    If this is ``\"collapsed\"``, Streamlit displays no label or spacer.\n\nwidth : \"stretch\" or int\n    The width of the camera input widget. This can be one of the\n    following:\n\n    - ``\"stretch\"`` (default): The width of the widget matches the\n      width of the parent container.\n    - An integer specifying the width in pixels: The widget has a\n      fixed width. If the specified width is greater than the width of\n      the parent container, the width of the widget matches the width\n      of the parent container.\n\nReturns\n-------\nNone or UploadedFile\n    The UploadedFile class is a subclass of BytesIO, and therefore is\n    \"file-like\". This means you can pass an instance of it anywhere a\n    file is expected.\n\nExamples\n--------\n>>> import streamlit as st\n>>>\n>>> enable = st.checkbox(\"Enable camera\")\n>>> picture = st.camera_input(\"Take a picture\", disabled=not enable)\n>>>\n>>> if picture:\n...     st.image(picture)\n\n.. output::\n   https://doc-camera-input.streamlit.app/\n   height: 600px"
