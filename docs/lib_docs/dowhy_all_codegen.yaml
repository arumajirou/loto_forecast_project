    name: fit
    path: dowhy.gcm.fitting_sampling.fit
    module: dowhy.gcm.fitting_sampling
    library: dowhy
    top_group: dowhy.gcm
    role: model_fit
    name_cluster: 66
    event_like: False
    return_type: nan
    docstring: "Fits the causal mechanism of each node to the data. This is done by iterating over the nodes in the graph and\nfitting their assigned causal mechanisms individually to the data by calling the corresponding fit function. Due to\nthe modularity assumption, we can fit each mechanism in the graph independently of the other mechanisms. For root\nnodes, the training data is the corresponding column in the provided data. For non-root nodes, the data is based on\na node's parents and the node itself. Before a node is fitted, this function first validates whether the assigned\nmechanism is valid, i.e., whether a root node follows a StochasticModel and whether a non-root node follows a\nConditionalStochasticModel.\n\nThe details of fitting a causal mechanism depend on their implementation. For example, if a node follows an additive\nnoise model X_i = f_i(PA_i) + N_i, where N_i is unobserved noise, the fitting involves fitting the function f_i\n(which could be any scikit-learn regressor) to the data and modeling the distribution N_i based on the residuals\nX_i - f_i(PA_i). For more details on how each individual mechanism is fitted, refer to the corresponding\ndocumentation, since these are individual implementation details.\n\nThis function optionally, returns a summary of different metrics of the causal mechanisms evaluated via\ncross-validation. Note, this will use the evaluate_causal_model method. For more detailed and extensive evaluations,\nconsider using the evaluate_causal_model method directly.\n\n:param causal_model: The causal model containing the mechanisms of the node that will be fitted.\n:param data: Observations of nodes in the causal model.\n:param return_evaluation_summary: If True, returns a summary of the performances of the fitted mechanisms using the\n                                  evaluate_causal_model method. If False, nothing is returned.\n:return: Optionally, a CausalModelEvaluationResult summarizing the performances of the causal mechanisms via\n         cross-validation."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: ProbabilisticCausalModel
        has_default: false
        default_repr: ""
      -
        name: data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: return_evaluation_summary
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: False
