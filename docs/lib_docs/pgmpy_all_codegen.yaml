           [2, 2, 2, 2]])\n>>> print(cpd_C)\n╒══════╤══════╤══════╤══════╤════════════════════╕\n│ A    │ A(0) │ A(0) │ A(1) │ A(1)               │\n├──────┼──────┼──────┼──────┼────────────────────┤\n│ B    │ B(0) │ B(1) │ B(0) │ B(1)               │\n├──────┼──────┼──────┼──────┼────────────────────┤\n│ C(0) │ 0.25 │ 0.25 │ 0.5  │ 0.3333333333333333 │\n├──────┼──────┼──────┼──────┼────────────────────┤\n│ C(1) │ 0.75 │ 0.75 │ 0.5  │ 0.6666666666666666 │\n╘══════╧══════╧══════╧══════╧════════════════════╛"
