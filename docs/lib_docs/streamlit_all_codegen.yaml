    return_type: DeltaGenerator
    docstring: "Display error message.\n\nParameters\n----------\nbody : str\n    The text to display as GitHub-flavored Markdown. Syntax\n    information can be found at: https://github.github.com/gfm.\n\n    See the ``body`` parameter of |st.markdown|_ for additional,\n    supported Markdown directives.\n\n    .. |st.markdown| replace:: ``st.markdown``\n    .. _st.markdown: https://docs.streamlit.io/develop/api-reference/text/st.markdown\n\nicon : str, None\n    An optional emoji or icon to display next to the alert. If ``icon``\n    is ``None`` (default), no icon is displayed. If ``icon`` is a\n    string, the following options are valid:\n\n    - A single-character emoji. For example, you can set ``icon=\"🚨\"``\n      or ``icon=\"🔥\"``. Emoji short codes are not supported.\n\n    - An icon from the Material Symbols library (rounded style) in the\n      format ``\":material/icon_name:\"`` where \"icon_name\" is the name\n      of the icon in snake case.\n\n      For example, ``icon=\":material/thumb_up:\"`` will display the\n      Thumb Up icon. Find additional icons in the `Material Symbols               <https://fonts.google.com/icons?icon.set=Material+Symbols&icon.style=Rounded>`_\n      font library.\n\n    - ``\"spinner\"``: Displays a spinner as an icon.\n\nwidth : \"stretch\" or int\n    The width of the alert element. This can be one of the following:\n\n    - ``\"stretch\"`` (default): The width of the element matches the\n      width of the parent container.\n    - An integer specifying the width in pixels: The element has a\n      fixed width. If the specified width is greater than the width of\n      the parent container, the width of the element matches the width\n      of the parent container.\n\nExample\n-------\n>>> import streamlit as st\n>>>\n>>> st.error('This is an error', icon=\"🚨\")"
    params:
      -
        name: self
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: body
        kind: POSITIONAL_OR_KEYWORD
        annotation: SupportsStr
        has_default: false
        default_repr: ""
      -
        name: icon
        kind: KEYWORD_ONLY
        annotation: "str | None"
        has_default: true
        default_repr: None
      -
        name: width
        kind: KEYWORD_ONLY
        annotation: WidthWithoutContent
        has_default: true
        default_repr: "'stretch'"
