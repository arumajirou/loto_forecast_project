    event_like: False
    return_type: ""
    docstring: "Returns communicability between all pairs of nodes in G.\n\nThe communicability between pairs of nodes in G is the sum of\nwalks of different lengths starting at node u and ending at node v.\n\nParameters\n----------\nG: graph\n\nReturns\n-------\ncomm: dictionary of dictionaries\n    Dictionary of dictionaries keyed by nodes with communicability\n    as the value.\n\nRaises\n------\nNetworkXError\n   If the graph is not undirected and simple.\n\nSee Also\n--------\ncommunicability_exp:\n   Communicability between all pairs of nodes in G  using spectral\n   decomposition.\ncommunicability_betweenness_centrality:\n   Communicability betweenness centrality for each node in G.\n\nNotes\n-----\nThis algorithm uses a spectral decomposition of the adjacency matrix.\nLet G=(V,E) be a simple undirected graph.  Using the connection between\nthe powers  of the adjacency matrix and the number of walks in the graph,\nthe communicability  between nodes `u` and `v` based on the graph spectrum\nis [1]_\n\n.. math::\n    C(u,v)=\\sum_{j=1}^{n}\\phi_{j}(u)\\phi_{j}(v)e^{\\lambda_{j}},\n\nwhere `\\phi_{j}(u)` is the `u\\rm{th}` element of the `j\\rm{th}` orthonormal\neigenvector of the adjacency matrix associated with the eigenvalue\n`\\lambda_{j}`.\n\nReferences\n----------\n.. [1] Ernesto Estrada, Naomichi Hatano,\n   \"Communicability in complex networks\",\n   Phys. Rev. E 77, 036111 (2008).\n   https://arxiv.org/abs/0707.0756\n\nExamples\n--------\n>>> G = nx.Graph([(0, 1), (1, 2), (1, 5), (5, 4), (2, 4), (2, 3), (4, 3), (3, 6)])\n>>> c = nx.communicability(G)"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.algorithms.communicability_alg import communicability\n\nresult = communicability(\n    G=None  # TODO,\n)\n"
