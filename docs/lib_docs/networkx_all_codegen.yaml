    docstring: "Returns the disjoint union of all graphs.\n\nThis operation forces distinct integer node labels starting with 0\nfor the first graph in the list and numbering consecutively.\n\nParameters\n----------\ngraphs : iterable\n   Iterable of NetworkX graphs\n\nReturns\n-------\nU : A graph with the same type as the first graph in list\n\nRaises\n------\nValueError\n   If `graphs` is an empty list.\n\nNetworkXError\n    In case of mixed type graphs, like MultiGraph and Graph, or directed and undirected graphs.\n\nExamples\n--------\n>>> G1 = nx.Graph([(1, 2), (2, 3)])\n>>> G2 = nx.Graph([(4, 5), (5, 6)])\n>>> U = nx.disjoint_union_all([G1, G2])\n>>> list(U.nodes())\n[0, 1, 2, 3, 4, 5]\n>>> list(U.edges())\n[(0, 1), (1, 2), (3, 4), (4, 5)]\n\nNotes\n-----\nFor operating on mixed type graphs, they should be converted to the same type.\n\nGraph, edge, and node attributes are propagated to the union graph.\nIf a graph attribute is present in multiple graphs, then the value\nfrom the last graph in the list with that attribute is used."
