    docstring: "Compute betweenness centrality for nodes in a bipartite network.\n\nBetweenness centrality of a node `v` is the sum of the\nfraction of all-pairs shortest paths that pass through `v`.\n\nValues of betweenness are normalized by the maximum possible\nvalue which for bipartite graphs is limited by the relative size\nof the two node sets [1]_.\n\nLet `n` be the number of nodes in the node set `U` and\n`m` be the number of nodes in the node set `V`, then\nnodes in `U` are normalized by dividing by\n\n.. math::\n\n   \\frac{1}{2} [m^2 (s + 1)^2 + m (s + 1)(2t - s - 1) - t (2s - t + 3)] ,\n\nwhere\n\n.. math::\n\n    s = (n - 1) \\div m , t = (n - 1) \\mod m ,\n\nand nodes in `V` are normalized by dividing by\n\n.. math::\n\n    \\frac{1}{2} [n^2 (p + 1)^2 + n (p + 1)(2r - p - 1) - r (2p - r + 3)] ,\n\nwhere,\n\n.. math::\n\n    p = (m - 1) \\div n , r = (m - 1) \\mod n .\n\nParameters\n----------\nG : graph\n    A bipartite graph\n\nnodes : list or container\n    Container with all nodes in one bipartite node set.\n\nReturns\n-------\nbetweenness : dictionary\n    Dictionary keyed by node with bipartite betweenness centrality\n    as the value.\n\nExamples\n--------\n>>> G = nx.cycle_graph(4)\n>>> top_nodes = {1, 2}\n>>> nx.bipartite.betweenness_centrality(G, nodes=top_nodes)\n{0: 0.25, 1: 0.25, 2: 0.25, 3: 0.25}\n\nSee Also\n--------\ndegree_centrality\ncloseness_centrality\n:func:`~networkx.algorithms.bipartite.basic.sets`\n:func:`~networkx.algorithms.bipartite.basic.is_bipartite`\n\nNotes\n-----\nThe nodes input parameter must contain all nodes in one bipartite node set,\nbut the dictionary returned contains all nodes from both node sets.\nSee :mod:`bipartite documentation <networkx.algorithms.bipartite>`\nfor further details on how bipartite graphs are handled in NetworkX.\n\n\nReferences\n----------\n.. [1] Borgatti, S.P. and Halgin, D. In press. \"Analyzing Affiliation\n    Networks\". In Carrington, P. and Scott, J. (eds) The Sage Handbook\n    of Social Network Analysis. Sage Publications.\n    https://dx.doi.org/10.4135/9781446294413.n28"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: nodes
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
