    docstring: "The PyTorch implementation of the TimesNet classification model :cite:`wu2023timesnet`.\n\nParameters\n----------\nn_steps :\n    The number of time steps in the time-series data sample.\n\nn_features :\n    The number of features in the time-series data sample.\n\nn_classes :\n    The number of classes in the classification task.\n\nn_layers :\n    The number of layers in the TimesNet model.\n\ntop_k :\n    The number of top-k amplitude values to be selected to  obtain the most significant frequencies.\n\nd_model :\n    The dimension of the model.\n\nd_ffn :\n    The dimension of the feed-forward network.\n\nn_kernels :\n    The number of 2D kernels (2D convolutional layers) to use in the submodule InceptionBlockV1.\n\ndropout :\n    The dropout rate for the model.\n\nbatch_size :\n    The batch size for training and evaluating the model.\n\nepochs :\n    The number of epochs for training the model.\n\npatience :\n    The patience for the early-stopping mechanism. Given a positive integer, the training process will be\n    stopped when the model does not perform better after that number of epochs.\n    Leaving it default as None will disable the early-stopping.\n\ntraining_loss:\n    The customized loss function designed by users for training the model.\n    If not given, will use the default loss as claimed in the original paper.\n\nvalidation_metric:\n    The customized metric function designed by users for validating the model.\n    If not given, will use the default loss from the original paper as the metric.\n\noptimizer :\n    The optimizer for model training.\n    If not given, will use a default Adam optimizer.\n\nnum_workers :\n    The number of subprocesses to use for data loading.\n    `0` means data loading will be in the main process, i.e. there won't be subprocesses.\n\ndevice :\n    The device for the model to run on. It can be a string, a :class:`torch.device` object, or a list of them.\n    If not given, will try to use CUDA devices first (will use the default CUDA device if there are multiple),\n    then CPUs, considering CUDA and CPU are so far the main devices for people to train ML models.\n    If given a list of devices, e.g. ['cuda:0', 'cuda:1'], or [torch.device('cuda:0'), torch.device('cuda:1')] , the\n    model will be parallely trained on the multiple devices (so far only support parallel training on CUDA devices).\n    Other devices like Google TPU and Apple Silicon accelerator MPS may be added in the future.\n\nsaving_path :\n    The path for automatically saving model checkpoints and tensorboard files (i.e. loss values recorded during\n    training into a tensorboard file). Will not save if not given.\n\nmodel_saving_strategy :\n    The strategy to save model checkpoints. It has to be one of [None, \"best\", \"better\", \"all\"].\n    No model will be saved when it is set as None.\n    The \"best\" strategy will only automatically save the best model after the training finished.\n    The \"better\" strategy will automatically save the model during training whenever the model performs\n    better than in previous epochs.\n    The \"all\" strategy will save every model after each epoch training.\n\nverbose :\n    Whether to print out the training logs during the training process."
