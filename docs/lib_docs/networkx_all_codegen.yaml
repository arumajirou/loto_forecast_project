    docstring: "Compute the shortest-path betweenness centrality for nodes.\n\nBetweenness centrality of a node $v$ is the sum of the\nfraction of all-pairs shortest paths that pass through $v$\n\n.. math::\n\n   c_B(v) =\\sum_{s,t \\in V} \\frac{\\sigma(s, t|v)}{\\sigma(s, t)}\n\nwhere $V$ is the set of nodes, $\\sigma(s, t)$ is the number of\nshortest $(s, t)$-paths,  and $\\sigma(s, t|v)$ is the number of\nthose paths  passing through some  node $v$ other than $s, t$.\nIf $s = t$, $\\sigma(s, t) = 1$, and if $v \\in {s, t}$,\n$\\sigma(s, t|v) = 0$ [2]_.\n\nParameters\n----------\nG : graph\n  A NetworkX graph.\n\nk : int, optional (default=None)\n  If k is not None use k node samples to estimate betweenness.\n  The value of k <= n where n is the number of nodes in the graph.\n  Higher values give better approximation.\n\nnormalized : bool, optional\n  If True the betweenness values are normalized by `2/((n-1)(n-2))`\n  for graphs, and `1/((n-1)(n-2))` for directed graphs where `n`\n  is the number of nodes in G.\n\nweight : None or string, optional (default=None)\n  If None, all edge weights are considered equal.\n  Otherwise holds the name of the edge attribute used as weight.\n  Weights are used to calculate weighted shortest paths, so they are\n  interpreted as distances.\n\nendpoints : bool, optional\n  If True include the endpoints in the shortest path counts.\n\nseed : integer, random_state, or None (default)\n    Indicator of random number generation state.\n    See :ref:`Randomness<randomness>`.\n    Note that this is only used if k is not None.\n\nReturns\n-------\nnodes : dictionary\n   Dictionary of nodes with betweenness centrality as the value.\n\nSee Also\n--------\nedge_betweenness_centrality\nload_centrality\n\nNotes\n-----\nThe algorithm is from Ulrik Brandes [1]_.\nSee [4]_ for the original first published version and [2]_ for details on\nalgorithms for variations and related metrics.\n\nFor approximate betweenness calculations set k=#samples to use\nk nodes (\"pivots\") to estimate the betweenness values. For an estimate\nof the number of pivots needed see [3]_.\n\nFor weighted graphs the edge weights must be greater than zero.\nZero edge weights can produce an infinite number of equal length\npaths between pairs of nodes.\n\nThe total number of paths between source and target is counted\ndifferently for directed and undirected graphs. Directed paths\nare easy to count. Undirected paths are tricky: should a path\nfrom \"u\" to \"v\" count as 1 undirected path or as 2 directed paths?\n\nFor betweenness_centrality we report the number of undirected\npaths when G is undirected.\n\nFor betweenness_centrality_subset the reporting is different.\nIf the source and target subsets are the same, then we want\nto count undirected paths. But if the source and target subsets\ndiffer -- for example, if sources is {0} and targets is {1},\nthen we are only counting the paths in one direction. They are\nundirected paths but we are counting them in a directed way.\nTo count them as undirected paths, each should count as half a path.\n\nThis algorithm is not guaranteed to be correct if edge weights\nare floating point numbers. As a workaround you can use integer\nnumbers by multiplying the relevant edge attributes by a convenient\nconstant factor (eg 100) and converting to integers.\n\nReferences\n----------\n.. [1] Ulrik Brandes:\n   A Faster Algorithm for Betweenness Centrality.\n   Journal of Mathematical Sociology 25(2):163-177, 2001.\n   https://doi.org/10.1080/0022250X.2001.9990249\n.. [2] Ulrik Brandes:\n   On Variants of Shortest-Path Betweenness\n   Centrality and their Generic Computation.\n   Social Networks 30(2):136-145, 2008.\n   https://doi.org/10.1016/j.socnet.2007.11.001\n.. [3] Ulrik Brandes and Christian Pich:\n   Centrality Estimation in Large Networks.\n   International Journal of Bifurcation and Chaos 17(7):2303-2318, 2007.\n   https://dx.doi.org/10.1142/S0218127407018403\n.. [4] Linton C. Freeman:\n   A set of measures of centrality based on betweenness.\n   Sociometry 40: 35–41, 1977\n   https://doi.org/10.2307/3033543"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: k
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
      -
        name: normalized
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: True
      -
        name: weight
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
      -
        name: endpoints
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: False
      -
        name: seed
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
