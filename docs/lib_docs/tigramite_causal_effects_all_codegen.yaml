    docstring: "Returns symbolified array of ordinal patterns.\n\nEach data vector (X_t, ..., X_t+(dim-1)*step) is converted to its rank\nvector. E.g., (0.2, -.6, 1.2) --> (1,0,2) which is then assigned to a\nunique integer (see Article). There are faculty(dim) possible rank vectors.\n\nNote that the symb_array is step*(dim-1) shorter than the original array!\n\nReference: B. Pompe and J. Runge (2011). Momentary information transfer as\na coupling measure of time series. Phys. Rev. E, 83(5), 1-12.\ndoi:10.1103/PhysRevE.83.051122\n\nParameters\n----------\narray : array-like\n    Data array of shape (time, variables).\narray_mask : bool array\n    Data mask where True labels masked samples.\ndim : int, optional (default: 2)\n    Pattern dimension\nstep : int, optional (default: 1)\n    Delay of pattern embedding vector.\nweights : bool, optional (default: False)\n    Whether to return array of variances of embedding vectors as weights.\nseed : int\n    For adding noise to break ties.\nverbosity : int, optional (default: 0)\n    Level of verbosity.\n\nReturns\n-------\npatt, patt_mask [, patt_time] : tuple of arrays\n    Tuple of converted pattern array and new length"
    params:
      -
        name: array
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: array_mask
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
      -
        name: dim
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: 2
      -
        name: step
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: 1
      -
        name: weights
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: False
      -
        name: seed
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
      -
        name: verbosity
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: 0
