        annotation: int
        has_default: true
        default_repr: 2000
      -
        name: difference_estimation_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: auto_estimate_kl_divergence
      -
        name: independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: conditional_independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: mechanism_change_test_significance_level
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
