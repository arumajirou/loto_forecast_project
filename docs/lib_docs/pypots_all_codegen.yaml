        name: targets
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Union[np.ndarray, torch.Tensor]"
        has_default: false
        default_repr: ""
      -
        name: masks
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Union[np.ndarray, torch.Tensor]]"
        has_default: true
        default_repr: None
