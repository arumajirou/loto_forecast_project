    path: deepchecks.nlp.text_data.TextData.calculate_builtin_properties
    module: deepchecks.nlp.text_data
    library: deepchecks
    top_group: deepchecks.nlp
    role: other
    name_cluster: 20
    event_like: False
    return_type: nan
    docstring: "Calculate the default properties of the dataset.\n\nParameters\n----------\ninclude_properties : List[str], default None\n    The properties to calculate. If None, all default properties will be calculated. Cannot be used\n    together with ignore_properties parameter. Available properties are:\n    ['Text Length', 'Average Word Length', 'Max Word Length',\n    '% Special Characters', '% Punctuation', 'Language',\n    'Sentiment', 'Subjectivity', 'Toxicity', 'Fluency', 'Formality', 'Lexical Density', 'Unique Noun Count',\n    'Reading Ease', 'Average Words Per Sentence', 'URLs Count', Unique URLs Count', 'Email Address Count',\n    'Unique Email Address Count', 'Unique Syllables Count', 'Reading Time', 'Sentences Count',\n    'Average Syllable Length']\n    List of default properties are: ['Text Length', 'Average Word Length', 'Max Word Length',\n    '% Special Characters', '% Punctuation', 'Language', 'Sentiment', 'Subjectivity', 'Toxicity', 'Fluency',\n    'Formality', 'Lexical Density', 'Unique Noun Count', 'Reading Ease', 'Average Words Per Sentence']\n    To calculate all the default properties, the include_properties and ignore_properties parameters should\n    be None. If you pass either include_properties or ignore_properties then only the properties specified\n    in the list will be calculated or ignored.\n    Note that the properties ['Toxicity', 'Fluency', 'Formality', 'Language', 'Unique Noun Count'] may\n    take a long time to calculate. If include_long_calculation_properties is False, these properties will be\n    ignored, even if they are in the include_properties parameter.\nignore_properties : List[str], default None\n    The properties to ignore from the list of default properties. If None, no properties will be ignored and\n    all the default properties will be calculated. Cannot be used together with include_properties parameter.\ninclude_long_calculation_properties : bool, default False\n    Whether to include properties that may take a long time to calculate. If False, these properties will be\n    ignored, unless they are specified in the include_properties parameter explicitly.\nignore_non_english_samples_for_english_properties : bool, default True\n    Whether to ignore samples that are not in English when calculating English properties. If False, samples\n    that are not in English will be calculated as well. This parameter is ignored when calculating non-English\n    properties.\n    English-Only properties WILL NOT work properly on non-English samples, and this parameter should be used\n    only when you are sure that all the samples are in English.\ndevice : Optional[str], default None\n    The device to use for the calculation. If None, the default device will be used. For onnx based models it is\n    recommended to set device to None for optimized performance.\nmodels_storage : Union[str, pathlib.Path, None], default None\n    A directory to store the models.\n    If not provided, models will be stored in `DEEPCHECKS_LIB_PATH/nlp/.nlp-models`.\n    Also, if a folder already contains relevant resources they are not re-downloaded.\nbatch_size : int, default 8\n    The batch size.\ncache_models : bool, default False\n    If True, will store the models in device RAM memory. This will speed up the calculation for future calls.\nuse_onnx_models : bool, default True\n    If True, will use onnx gpu optimized models for the calculation. Requires the optimum[onnxruntime-gpu]\n    library to be installed as well as the availability of GPU."
    params:
      -
        name: self
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: include_properties
        kind: POSITIONAL_OR_KEYWORD
        annotation: "t.Optional[t.List[str]]"
        has_default: true
        default_repr: None
      -
        name: ignore_properties
        kind: POSITIONAL_OR_KEYWORD
        annotation: "t.Optional[t.List[str]]"
        has_default: true
        default_repr: None
      -
        name: include_long_calculation_properties
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: False
      -
        name: ignore_non_english_samples_for_english_properties
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: device
        kind: POSITIONAL_OR_KEYWORD
        annotation: "t.Optional[str]"
        has_default: true
        default_repr: None
      -
        name: models_storage
        kind: POSITIONAL_OR_KEYWORD
        annotation: "t.Union[pathlib.Path, str, None]"
        has_default: true
        default_repr: None
      -
        name: batch_size
        kind: POSITIONAL_OR_KEYWORD
        annotation: "t.Optional[int]"
        has_default: true
        default_repr: 16
      -
        name: cache_models
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: False
      -
