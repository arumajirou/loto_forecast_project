    role: other
    name_cluster: 173
    event_like: False
    return_type: np.ndarray
    docstring: "Estimates the Shapley values based on the provided set function. A set function here is defined by taking a\n(subset) of players and returning a certain utility value. This is in the context of attributing the\nvalue of the i-th player to a subset of players S by evaluating v(S u {i}) - v(S), where v is the\nset function and i is not in S. While we use the term 'player' here, this is often a certain feature/variable.\n\nThe input of the set function is a binary vector indicating which player is part of the set. For instance, given 4\nplayers (1,2,3,4) and a subset only contains players 1,2,4, then this is indicated by the vector [1, 1, 0, 1]. The\nfunction is expected to return a numeric value based on this input.\n\nNote: The set function can be arbitrary and can resemble computationally complex operations. Keep in mind\nthat the estimation of Shapley values can become computationally expensive and requires a lot of memory. If the\nruntime is too slow, consider changing the default config.\n\n:param set_func: A set function that expects a binary vector as input which specifies which player is part of the\n                 subset.\n:param num_players: Total number of players.\n:param shapley_config: A config object for indicating the approximation method and other parameters. If None is\n                       given, a default config is used. For faster runtime or more accurate results, consider\n                       creating a custom config.\n:return: A numpy array representing the Shapley values for each player, i.e. there are as many Shapley values as\n         num_players. The i-th entry belongs to the i-th player. Here, the set function defines which index belongs\n         to which player and is responsible to keep it consistent."
    params:
      -
        name: set_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray], Union[float, np.ndarray]]"
        has_default: false
        default_repr: ""
      -
        name: num_players
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: false
        default_repr: ""
      -
        name: shapley_config
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[ShapleyConfig]"
        has_default: true
        default_repr: None
