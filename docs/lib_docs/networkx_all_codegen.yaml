    docstring: "Returns the directed modularity matrix of G.\n\nThe modularity matrix is the matrix B = A - <A>, where A is the adjacency\nmatrix and <A> is the expected adjacency matrix, assuming that the graph\nis described by the configuration model.\n\nMore specifically, the element B_ij of B is defined as\n\n.. math::\n    B_{ij} = A_{ij} - k_i^{out} k_j^{in} / m\n\nwhere :math:`k_i^{in}` is the in degree of node i, and :math:`k_j^{out}` is the out degree\nof node j, with m the number of edges in the graph. When weight is set\nto a name of an attribute edge, Aij, k_i, k_j and m are computed using\nits value.\n\nParameters\n----------\nG : DiGraph\n   A NetworkX DiGraph\n\nnodelist : list, optional\n   The rows and columns are ordered according to the nodes in nodelist.\n   If nodelist is None, then the ordering is produced by G.nodes().\n\nweight : string or None, optional (default=None)\n   The edge attribute that holds the numerical value used for\n   the edge weight.  If None then all edge weights are 1.\n\nReturns\n-------\nB : Numpy array\n  The modularity matrix of G.\n\nExamples\n--------\n>>> G = nx.DiGraph()\n>>> G.add_edges_from(\n...     (\n...         (1, 2),\n...         (1, 3),\n...         (3, 1),\n...         (3, 2),\n...         (3, 5),\n...         (4, 5),\n...         (4, 6),\n...         (5, 4),\n...         (5, 6),\n...         (6, 4),\n...     )\n... )\n>>> B = nx.directed_modularity_matrix(G)\n\n\nNotes\n-----\nNetworkX defines the element A_ij of the adjacency matrix as 1 if there\nis a link going from node i to node j. Leicht and Newman use the opposite\ndefinition. This explains the different expression for B_ij.\n\nSee Also\n--------\nto_numpy_array\nmodularity_spectrum\nadjacency_matrix\nmodularity_matrix\n\nReferences\n----------\n.. [1] E. A. Leicht, M. E. J. Newman,\n    \"Community structure in directed networks\",\n    Phys. Rev Lett., vol. 100, no. 11, p. 118703, 2008."
