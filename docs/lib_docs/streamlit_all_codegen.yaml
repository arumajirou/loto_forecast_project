    type: method
    name: write
    path: streamlit.elements.write.WriteMixin.write
    module: streamlit.elements.write
    library: streamlit
    top_group: streamlit.elements
    role: io_write
    name_cluster: 209
    event_like: False
    return_type: None
    docstring: "Displays arguments in the app.\n\nThis is the Swiss Army knife of Streamlit commands: it does different\nthings depending on what you throw at it. Unlike other Streamlit\ncommands, ``st.write()`` has some unique properties:\n\n- You can pass in multiple arguments, all of which will be displayed.\n- Its behavior depends on the input type(s).\n\nParameters\n----------\n*args : any\n    One or many objects to display in the app.\n\n    .. list-table:: Each type of argument is handled as follows:\n        :header-rows: 1\n\n        * - Type\n          - Handling\n        * - ``str``\n          - Uses ``st.markdown()``.\n        * - dataframe-like, ``dict``, or ``list``\n          - Uses ``st.dataframe()``.\n        * - ``Exception``\n          - Uses ``st.exception()``.\n        * - function, module, or class\n          - Uses ``st.help()``.\n        * - ``DeltaGenerator``\n          - Uses ``st.help()``.\n        * - Altair chart\n          - Uses ``st.altair_chart()``.\n        * - Bokeh figure\n          - Uses ``st.bokeh_chart()``.\n        * - Graphviz graph\n          - Uses ``st.graphviz_chart()``.\n        * - Keras model\n          - Converts model and uses ``st.graphviz_chart()``.\n        * - Matplotlib figure\n          - Uses ``st.pyplot()``.\n        * - Plotly figure\n          - Uses ``st.plotly_chart()``.\n        * - ``PIL.Image``\n          - Uses ``st.image()``.\n        * - generator or stream (like ``openai.Stream``)\n          - Uses ``st.write_stream()``.\n        * - SymPy expression\n          - Uses ``st.latex()``.\n        * - An object with ``._repr_html()``\n          - Uses ``st.html()``.\n        * - Database cursor\n          - Displays DB API 2.0 cursor results in a table.\n        * - Any\n          - Displays ``str(arg)`` as inline code.\n\nunsafe_allow_html : bool\n    Whether to render HTML within ``*args``. This only applies to\n    strings or objects falling back on ``_repr_html_()``. If this is\n    ``False`` (default), any HTML tags found in ``body`` will be\n    escaped and therefore treated as raw text. If this is ``True``, any\n    HTML expressions within ``body`` will be rendered.\n\n    Adding custom HTML to your app impacts safety, styling, and\n    maintainability.\n\n    .. note::\n        If you only want to insert HTML or CSS without Markdown text,\n        we recommend using ``st.html`` instead.\n\n\nReturns\n-------\nNone\n\nExamples\n--------\nIts basic use case is to draw Markdown-formatted text, whenever the\ninput is a string:\n\n>>> import streamlit as st\n>>>\n>>> st.write(\"Hello, *World!* :sunglasses:\")\n\n..  output::\n    https://doc-write1.streamlit.app/\n    height: 150px\n\nAs mentioned earlier, ``st.write()`` also accepts other data formats, such as\nnumbers, data frames, styled data frames, and assorted objects:\n\n>>> import streamlit as st\n>>> import pandas as pd\n>>>\n>>> st.write(1234)\n>>> st.write(\n...     pd.DataFrame(\n...         {\n...             \"first column\": [1, 2, 3, 4],\n...             \"second column\": [10, 20, 30, 40],\n...         }\n...     )\n... )\n\n..  output::\n    https://doc-write2.streamlit.app/\n    height: 350px\n\nFinally, you can pass in multiple arguments to do things like:\n\n>>> import streamlit as st\n>>>\n>>> st.write(\"1 + 1 = \", 2)\n>>> st.write(\"Below is a DataFrame:\", data_frame, \"Above is a dataframe.\")\n\n..  output::\n    https://doc-write3.streamlit.app/\n    height: 410px\n\nOh, one more thing: ``st.write`` accepts chart objects too! For example:\n\n>>> import altair as alt\n>>> import pandas as pd\n>>> import streamlit as st\n>>> from numpy.random import default_rng as rng\n>>>\n>>> df = pd.DataFrame(rng(0).standard_normal((200, 3)), columns=[\"a\", \"b\", \"c\"])\n>>> chart = (\n...     alt.Chart(df)\n...     .mark_circle()\n...     .encode(x=\"a\", y=\"b\", size=\"c\", color=\"c\", tooltip=[\"a\", \"b\", \"c\"])\n... )\n>>>\n>>> st.write(chart)\n\n..  output::\n    https://doc-vega-lite-chart.streamlit.app/\n    height: 300px"
    params:
      -
        name: self
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: args
        kind: VAR_POSITIONAL
        annotation: Any
        has_default: false
        default_repr: ""
      -
        name: unsafe_allow_html
        kind: KEYWORD_ONLY
        annotation: bool
        has_default: true
        default_repr: False
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom streamlit.elements.write import WriteMixin\n\nobj = WriteMixin()  # TODO: __init__ args\n\nresult = obj.write(\n    unsafe_allow_html=False,\n)\n"
