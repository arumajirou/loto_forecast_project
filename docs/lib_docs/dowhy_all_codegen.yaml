    event_like: False
    return_type: "Dict[Any, np.ndarray]"
    docstring: "Estimates the contributions of upstream nodes to the anomaly score of the target_node for each sample in\nanomaly_samples. By default, the anomaly score is based on the information theoretic (IT) score\n-log(P(g(X) >= g(x))), where g is the anomaly_scorer, X samples from the marginal\ndistribution of the target_node and x an observation of the target_node in anomaly_samples. If\nattribute_mean_deviation is set to True, the contribution to g(x) - E[g(X)] is estimated instead, i.e. the feature\nrelevance for the given scoring function. The underlying algorithm utilizes the reconstructed noise of upstream\nnodes (including the target_node itself) for the given anomaly_samples. By this, it is possible to estimate how\nmuch of the anomaly score can be explained by upstream anomalies with respect to anomalous noise values.\n\nNote: This function requires that the noise can be recovered from samples, i.e. the causal models of non-root nodes\nneed to be an InvertibleNoiseModel (e.g. AdditiveNoiseModel).\n\nRelated paper:\nJanzing, D., Budhathoki, K., Minorics, L., & Bloebaum, P. (2019).\nCausal structure based root cause analysis of outliers\nhttps://arxiv.org/abs/1912.02724\n\n:param causal_model: The fitted InvertibleStructuralCausalModel.\n:param target_node: Target node for which the contributions are estimated.\n:param anomaly_samples: Anomalous observations for which the contributions are estimated.\n:param anomaly_scorer: Anomaly scorer g. If None is given, a MedianCDFQuantileScorer is used.\n:param attribute_mean_deviation: If set to False, the contribution is estimated based on the IT score and if it is\n                                 set to True, the contribution is based on the feature relevance with respect to the given scoring function.\n:param num_distribution_samples: Number of samples from X, the marginal distribution of the target. These are used\n                                 for evaluating the tail probability in case of the IT score\n                                 (attribute_mean_deviation is False) or as samples for randomization in case of\n                                 feature relevance (attribute_mean_deviation is True).\n:param shapley_config: :class:`~dowhy.gcm.shapley.ShapleyConfig` for the Shapley estimator.\n:return: A dictionary that assigns a numpy array to each upstream node including the target_node itself. The\n         i-th entry of an array indicates the contribution of the corresponding node to the anomaly score of the target\n         for the i-th observation in anomaly_samples."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: InvertibleStructuralCausalModel
        has_default: false
        default_repr: ""
      -
        name: target_node
        kind: POSITIONAL_OR_KEYWORD
        annotation: Any
        has_default: false
        default_repr: ""
      -
        name: anomaly_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: anomaly_scorer
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[AnomalyScorer]"
        has_default: true
        default_repr: None
      -
        name: attribute_mean_deviation
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: False
      -
        name: num_distribution_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 3000
      -
        name: shapley_config
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[ShapleyConfig]"
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.anomaly import attribute_anomalies\n\nresult = attribute_anomalies(\n    causal_model=None  # TODO: InvertibleStructuralCausalModel,\n    target_node=None  # TODO: Any,\n    anomaly_samples=None  # TODO: pd.DataFrame,\n    anomaly_scorer=None,\n    attribute_mean_deviation=False,\n    num_distribution_samples=3000,\n    shapley_config=None,\n)\n"
