    module: dowhy.gcm.divergence
    library: dowhy
    top_group: dowhy.gcm
    role: other
    name_cluster: 91
    event_like: False
    return_type: float
    docstring: "Estimates KL-Divergence based on probabilities given by classifier. This is:\n\n    D_f(P || Q) = \\int f(p(x)/q(x)) q(x) dx ~= -1/N \\sum_x log(p(Y = 1 | x) / (1 - p(Y = 1 | x)))\n\nHere, the KL divergence can be approximated using the log ratios of probabilities to predict whether a sample\ncomes from distribution P or Q.\n\n:param samples_P: Samples drawn from P. Can have a different number of samples than Q.\n:param samples_Q: Samples drawn from Q. Can have a different number of samples than P.\n:param n_splits: Number of splits of the training and test data. The classifier is trained on the training\n                 data and evaluated on the test data to obtain the probabilities.\n:param classifier_model: Used to estimate the probabilities for the log ratio. This can either be a\n                         ClassificationModel or an AssignmentQuality. In the latter, a model is automatically\n                         selected based on the best performance on a training set.\n:param epsilon: If the probability is either 1 or 0, this value will be used for clipping, i.e., 0 becomes epsilon\n                and 1 becomes 1- epsilon.\n:return: Estimated value of the KL divergence D(P||Q)."
    params:
      -
        name: samples_P
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
        name: samples_Q
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.ndarray
        has_default: false
        default_repr: ""
      -
        name: n_splits
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 5
      -
        name: classifier_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Union[AssignmentQuality, Callable[[], ClassificationModel]]"
        has_default: true
        default_repr: "partial(create_logistic_regression_classifier, max_iter=10000)"
      -
        name: epsilon
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: EPS
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.divergence import estimate_kl_divergence_continuous_clf\n\nresult = estimate_kl_divergence_continuous_clf(\n    samples_P=None  # TODO: np.ndarray,\n    samples_Q=None  # TODO: np.ndarray,\n    n_splits=5,\n    classifier_model=partial(create_logistic_regression_classifier, max_iter=10000),\n    epsilon=EPS,\n)\n"
