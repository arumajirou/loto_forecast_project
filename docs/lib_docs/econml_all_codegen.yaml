        annotation: ""
        has_default: true
        default_repr: 0
      -
        name: alpha
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: 0.05
      -
        name: interval_type
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: "'ci'"
