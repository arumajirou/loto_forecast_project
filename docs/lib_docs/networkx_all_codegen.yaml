    path: networkx.algorithms.link_analysis.pagerank_alg.pagerank
    module: networkx.algorithms.link_analysis.pagerank_alg
    library: networkx
    top_group: networkx.algorithms
    role: analysis
    name_cluster: 1095
    event_like: False
    return_type: ""
    docstring: "Returns the PageRank of the nodes in the graph.\n\nPageRank computes a ranking of the nodes in the graph G based on\nthe structure of the incoming links. It was originally designed as\nan algorithm to rank web pages.\n\nParameters\n----------\nG : graph\n  A NetworkX graph.  Undirected graphs will be converted to a directed\n  graph with two directed edges for each undirected edge.\n\nalpha : float, optional\n  Damping parameter for PageRank, default=0.85.\n\npersonalization: dict, optional\n  The \"personalization vector\" consisting of a dictionary with a\n  key some subset of graph nodes and personalization value each of those.\n  At least one personalization value must be non-zero.\n  If not specified, a nodes personalization value will be zero.\n  By default, a uniform distribution is used.\n\nmax_iter : integer, optional\n  Maximum number of iterations in power method eigenvalue solver.\n\ntol : float, optional\n  Error tolerance used to check convergence in power method solver.\n  The iteration will stop after a tolerance of ``len(G) * tol`` is reached.\n\nnstart : dictionary, optional\n  Starting value of PageRank iteration for each node.\n\nweight : key, optional\n  Edge data key to use as weight.  If None weights are set to 1.\n\ndangling: dict, optional\n  The outedges to be assigned to any \"dangling\" nodes, i.e., nodes without\n  any outedges. The dict key is the node the outedge points to and the dict\n  value is the weight of that outedge. By default, dangling nodes are given\n  outedges according to the personalization vector (uniform if not\n  specified). This must be selected to result in an irreducible transition\n  matrix (see notes under google_matrix). It may be common to have the\n  dangling dict to be the same as the personalization dict.\n\n\nReturns\n-------\npagerank : dictionary\n   Dictionary of nodes with PageRank as value\n\nExamples\n--------\n>>> G = nx.DiGraph(nx.path_graph(4))\n>>> pr = nx.pagerank(G, alpha=0.9)\n\nNotes\n-----\nThe eigenvector calculation is done by the power iteration method\nand has no guarantee of convergence.  The iteration will stop after\nan error tolerance of ``len(G) * tol`` has been reached. If the\nnumber of iterations exceed `max_iter`, a\n:exc:`networkx.exception.PowerIterationFailedConvergence` exception\nis raised.\n\nThe PageRank algorithm was designed for directed graphs but this\nalgorithm does not check if the input graph is directed and will\nexecute on undirected graphs by converting each edge in the\ndirected graph to two edges.\n\nSee Also\n--------\ngoogle_matrix\n\nRaises\n------\nPowerIterationFailedConvergence\n    If the algorithm fails to converge to the specified tolerance\n    within the specified number of iterations of the power iteration\n    method.\n\nReferences\n----------\n.. [1] A. Langville and C. Meyer,\n   \"A survey of eigenvector methods of web information retrieval.\"\n   http://citeseer.ist.psu.edu/713792.html\n.. [2] Page, Lawrence; Brin, Sergey; Motwani, Rajeev and Winograd, Terry,\n   The PageRank citation ranking: Bringing order to the Web. 1999\n   http://dbpubs.stanford.edu:8090/pub/showDoc.Fulltext?lang=en&doc=1999-66&format=pdf"
    params:
