        name: k
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 1
      -
        name: remove_common_elements
        kind: POSITIONAL_OR_KEYWORD
        annotation: bool
        has_default: true
        default_repr: True
      -
        name: n_jobs
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 1
