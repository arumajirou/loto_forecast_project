    name: k_components
    path: networkx.algorithms.approximation.kcomponents.k_components
    module: networkx.algorithms.approximation.kcomponents
    library: networkx
    top_group: networkx.algorithms
    role: other
    name_cluster: 882
    event_like: False
    return_type: ""
    docstring: "Returns the approximate k-component structure of a graph G.\n\nA `k`-component is a maximal subgraph of a graph G that has, at least,\nnode connectivity `k`: we need to remove at least `k` nodes to break it\ninto more components. `k`-components have an inherent hierarchical\nstructure because they are nested in terms of connectivity: a connected\ngraph can contain several 2-components, each of which can contain\none or more 3-components, and so forth.\n\nThis implementation is based on the fast heuristics to approximate\nthe `k`-component structure of a graph [1]_. Which, in turn, it is based on\na fast approximation algorithm for finding good lower bounds of the number\nof node independent paths between two nodes [2]_.\n\nParameters\n----------\nG : NetworkX graph\n    Undirected graph\n\nmin_density : Float\n    Density relaxation threshold. Default value 0.95\n\nReturns\n-------\nk_components : dict\n    Dictionary with connectivity level `k` as key and a list of\n    sets of nodes that form a k-component of level `k` as values.\n\nRaises\n------\nNetworkXNotImplemented\n    If G is directed.\n\nExamples\n--------\n>>> # Petersen graph has 10 nodes and it is triconnected, thus all\n>>> # nodes are in a single component on all three connectivity levels\n>>> from networkx.algorithms import approximation as apxa\n>>> G = nx.petersen_graph()\n>>> k_components = apxa.k_components(G)\n\nNotes\n-----\nThe logic of the approximation algorithm for computing the `k`-component\nstructure [1]_ is based on repeatedly applying simple and fast algorithms\nfor `k`-cores and biconnected components in order to narrow down the\nnumber of pairs of nodes over which we have to compute White and Newman's\napproximation algorithm for finding node independent paths [2]_. More\nformally, this algorithm is based on Whitney's theorem, which states\nan inclusion relation among node connectivity, edge connectivity, and\nminimum degree for any graph G. This theorem implies that every\n`k`-component is nested inside a `k`-edge-component, which in turn,\nis contained in a `k`-core. Thus, this algorithm computes node independent\npaths among pairs of nodes in each biconnected part of each `k`-core,\nand repeats this procedure for each `k` from 3 to the maximal core number\nof a node in the input graph.\n\nBecause, in practice, many nodes of the core of level `k` inside a\nbicomponent actually are part of a component of level k, the auxiliary\ngraph needed for the algorithm is likely to be very dense. Thus, we use\na complement graph data structure (see `AntiGraph`) to save memory.\nAntiGraph only stores information of the edges that are *not* present\nin the actual auxiliary graph. When applying algorithms to this\ncomplement graph data structure, it behaves as if it were the dense\nversion.\n\nSee also\n--------\nk_components\n\nReferences\n----------\n.. [1]  Torrents, J. and F. Ferraro (2015) Structural Cohesion:\n        Visualization and Heuristics for Fast Computation.\n        https://arxiv.org/pdf/1503.04476v1\n\n.. [2]  White, Douglas R., and Mark Newman (2001) A Fast Algorithm for\n        Node-Independent Paths. Santa Fe Institute Working Paper #01-07-035\n        https://www.santafe.edu/research/results/working-papers/fast-approximation-algorithms-for-finding-node-ind\n\n.. [3]  Moody, J. and D. White (2003). Social cohesion and embeddedness:\n        A hierarchical conception of social groups.\n        American Sociological Review 68(1), 103--28.\n        https://doi.org/10.2307/3088904"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: min_density
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: 0.95
