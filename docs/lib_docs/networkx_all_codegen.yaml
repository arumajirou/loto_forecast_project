    docstring: "Find a minimum cost flow satisfying all demands in digraph G.\n\nThis is a capacity scaling successive shortest augmenting path algorithm.\n\nG is a digraph with edge costs and capacities and in which nodes\nhave demand, i.e., they want to send or receive some amount of\nflow. A negative demand means that the node wants to send flow, a\npositive demand means that the node want to receive flow. A flow on\nthe digraph G satisfies all demand if the net flow into each node\nis equal to the demand of that node.\n\nParameters\n----------\nG : NetworkX graph\n    DiGraph or MultiDiGraph on which a minimum cost flow satisfying all\n    demands is to be found.\n\ndemand : string\n    Nodes of the graph G are expected to have an attribute demand\n    that indicates how much flow a node wants to send (negative\n    demand) or receive (positive demand). Note that the sum of the\n    demands should be 0 otherwise the problem in not feasible. If\n    this attribute is not present, a node is considered to have 0\n    demand. Default value: 'demand'.\n\ncapacity : string\n    Edges of the graph G are expected to have an attribute capacity\n    that indicates how much flow the edge can support. If this\n    attribute is not present, the edge is considered to have\n    infinite capacity. Default value: 'capacity'.\n\nweight : string\n    Edges of the graph G are expected to have an attribute weight\n    that indicates the cost incurred by sending one unit of flow on\n    that edge. If not present, the weight is considered to be 0.\n    Default value: 'weight'.\n\nheap : class\n    Type of heap to be used in the algorithm. It should be a subclass of\n    :class:`MinHeap` or implement a compatible interface.\n\n    If a stock heap implementation is to be used, :class:`BinaryHeap` is\n    recommended over :class:`PairingHeap` for Python implementations without\n    optimized attribute accesses (e.g., CPython) despite a slower\n    asymptotic running time. For Python implementations with optimized\n    attribute accesses (e.g., PyPy), :class:`PairingHeap` provides better\n    performance. Default value: :class:`BinaryHeap`.\n\nReturns\n-------\nflowCost : integer\n    Cost of a minimum cost flow satisfying all demands.\n\nflowDict : dictionary\n    If G is a digraph, a dict-of-dicts keyed by nodes such that\n    flowDict[u][v] is the flow on edge (u, v).\n    If G is a MultiDiGraph, a dict-of-dicts-of-dicts keyed by nodes\n    so that flowDict[u][v][key] is the flow on edge (u, v, key).\n\nRaises\n------\nNetworkXError\n    This exception is raised if the input graph is not directed,\n    not connected.\n\nNetworkXUnfeasible\n    This exception is raised in the following situations:\n\n        * The sum of the demands is not zero. Then, there is no\n          flow satisfying all demands.\n        * There is no flow satisfying all demand.\n\nNetworkXUnbounded\n    This exception is raised if the digraph G has a cycle of\n    negative cost and infinite capacity. Then, the cost of a flow\n    satisfying all demands is unbounded below.\n\nNotes\n-----\nThis algorithm does not work if edge weights are floating-point numbers.\n\nSee also\n--------\n:meth:`network_simplex`\n\nExamples\n--------\nA simple example of a min cost flow problem.\n\n>>> G = nx.DiGraph()\n>>> G.add_node(\"a\", demand=-5)\n>>> G.add_node(\"d\", demand=5)\n>>> G.add_edge(\"a\", \"b\", weight=3, capacity=4)\n>>> G.add_edge(\"a\", \"c\", weight=6, capacity=10)\n>>> G.add_edge(\"b\", \"d\", weight=1, capacity=9)\n>>> G.add_edge(\"c\", \"d\", weight=2, capacity=5)\n>>> flowCost, flowDict = nx.capacity_scaling(G)\n>>> flowCost\n24\n>>> flowDict\n{'a': {'b': 4, 'c': 1}, 'd': {}, 'b': {'d': 4}, 'c': {'d': 1}}\n\nIt is possible to change the name of the attributes used for the\nalgorithm.\n\n>>> G = nx.DiGraph()\n>>> G.add_node(\"p\", spam=-4)\n>>> G.add_node(\"q\", spam=2)\n>>> G.add_node(\"a\", spam=-2)\n>>> G.add_node(\"d\", spam=-1)\n>>> G.add_node(\"t\", spam=2)\n>>> G.add_node(\"w\", spam=3)\n>>> G.add_edge(\"p\", \"q\", cost=7, vacancies=5)\n>>> G.add_edge(\"p\", \"a\", cost=1, vacancies=4)\n>>> G.add_edge(\"q\", \"d\", cost=2, vacancies=3)\n>>> G.add_edge(\"t\", \"q\", cost=1, vacancies=2)\n>>> G.add_edge(\"a\", \"t\", cost=2, vacancies=4)\n>>> G.add_edge(\"d\", \"w\", cost=3, vacancies=4)\n>>> G.add_edge(\"t\", \"w\", cost=4, vacancies=1)\n>>> flowCost, flowDict = nx.capacity_scaling(\n...     G, demand=\"spam\", capacity=\"vacancies\", weight=\"cost\"\n... )\n>>> flowCost\n37\n>>> flowDict\n{'p': {'q': 2, 'a': 2}, 'q': {'d': 1}, 'a': {'t': 4}, 'd': {'w': 2}, 't': {'q': 1, 'w': 1}, 'w': {}}"
