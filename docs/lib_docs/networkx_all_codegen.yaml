        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: offsets
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: create_using
