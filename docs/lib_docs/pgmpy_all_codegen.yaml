    docstring: "Base class for all Directed Graphical Models.\n\nEach node in the graph can represent either a random variable, `Factor`,\nor a cluster of random variables. Edges in the graph represent the\ndependencies between these.\n\nParameters\n----------\ndata: input graph\n    Data to initialize graph. If data=None (default) an empty graph is\n    created. The data can be an edge list or any Networkx graph object.\n\nExamples\n--------\nCreate an empty DAG with no nodes and no edges\n\n>>> from pgmpy.base import DAG\n>>> G = DAG()\n\nG can be grown in several ways:\n\n**Nodes:**\n\nAdd one node at a time:\n\n>>> G.add_node(node='a')\n\nAdd the nodes from any container (a list, set or tuple or the nodes\nfrom another graph).\n\n>>> G.add_nodes_from(nodes=['a', 'b'])\n\n**Edges:**\n\nG can also be grown by adding edges.\n\nAdd one edge,\n\n>>> G.add_edge(u='a', v='b')\n\na list of edges,\n\n>>> G.add_edges_from(ebunch=[('a', 'b'), ('b', 'c')])\n\nIf some edges connect nodes not yet in the model, the nodes\nare added automatically. There are no errors when adding\nnodes or edges that already exist.\n\n**Shortcuts:**\n\nMany common graph features allow python syntax for speed reporting.\n\n>>> 'a' in G     # check if node in graph\nTrue\n>>> len(G)  # number of nodes in graph\n3"
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom pgmpy.base.DAG import DAG\n\nobj = DAG(\n    ebunch=None,\n    latents=set(),\n    lavaan_str=None,\n    dagitty_str=None,\n)\n"
