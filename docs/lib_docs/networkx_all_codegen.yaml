    docstring: "Compute the closeness centrality for nodes in a bipartite network.\n\nThe closeness of a node is the distance to all other nodes in the\ngraph or in the case that the graph is not connected to all other nodes\nin the connected component containing that node.\n\nParameters\n----------\nG : graph\n    A bipartite network\n\nnodes : list or container\n    Container with all nodes in one bipartite node set.\n\nnormalized : bool, optional\n  If True (default) normalize by connected component size.\n\nReturns\n-------\ncloseness : dictionary\n    Dictionary keyed by node with bipartite closeness centrality\n    as the value.\n\nExamples\n--------\n>>> G = nx.wheel_graph(5)\n>>> top_nodes = {0, 1, 2}\n>>> nx.bipartite.closeness_centrality(G, nodes=top_nodes)\n{0: 1.5, 1: 1.2, 2: 1.2, 3: 1.0, 4: 1.0}\n\nSee Also\n--------\nbetweenness_centrality\ndegree_centrality\n:func:`~networkx.algorithms.bipartite.basic.sets`\n:func:`~networkx.algorithms.bipartite.basic.is_bipartite`\n\nNotes\n-----\nThe nodes input parameter must contain all nodes in one bipartite node set,\nbut the dictionary returned contains all nodes from both node sets.\nSee :mod:`bipartite documentation <networkx.algorithms.bipartite>`\nfor further details on how bipartite graphs are handled in NetworkX.\n\n\nCloseness centrality is normalized by the minimum distance possible.\nIn the bipartite case the minimum distance for a node in one bipartite\nnode set is 1 from all nodes in the other node set and 2 from all\nother nodes in its own set [1]_. Thus the closeness centrality\nfor node `v`  in the two bipartite sets `U` with\n`n` nodes and `V` with `m` nodes is\n\n.. math::\n\n    c_{v} = \\frac{m + 2(n - 1)}{d}, \\mbox{for} v \\in U,\n\n    c_{v} = \\frac{n + 2(m - 1)}{d}, \\mbox{for} v \\in V,\n\nwhere `d` is the sum of the distances from `v` to all\nother nodes.\n\nHigher values of closeness  indicate higher centrality.\n\nAs in the unipartite case, setting normalized=True causes the\nvalues to normalized further to n-1 / size(G)-1 where n is the\nnumber of nodes in the connected part of graph containing the\nnode.  If the graph is not completely connected, this algorithm\ncomputes the closeness centrality for each connected part\nseparately.\n\nReferences\n----------\n.. [1] Borgatti, S.P. and Halgin, D. In press. \"Analyzing Affiliation\n    Networks\". In Carrington, P. and Scott, J. (eds) The Sage Handbook\n    of Social Network Analysis. Sage Publications.\n    https://dx.doi.org/10.4135/9781446294413.n28"
