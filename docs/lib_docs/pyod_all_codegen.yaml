    docstring: "Wrapper of scikit-learn Gaussian Mixture Model with more functionalities.\nUnsupervised Outlier Detection.\n\nSee :cite:`aggarwal2015outlier` Chapter 2 for details.\n\nParameters\n----------\nn_components : int, default=1\n    The number of mixture components.\n\ncovariance_type : {'full', 'tied', 'diag', 'spherical'}, default='full'\n    String describing the type of covariance parameters to use.\n\ntol : float, default=1e-3\n    The convergence threshold. EM iterations will stop when the\n    lower bound average gain is below this threshold.\n\nreg_covar : float, default=1e-6\n    Non-negative regularization added to the diagonal of covariance.\n    Allows to assure that the covariance matrices are all positive.\n\nmax_iter : int, default=100\n    The number of EM iterations to perform.\n\nn_init : int, default=1\n    The number of initializations to perform. The best results are kept.\n\ninit_params : {'kmeans', 'random'}, default='kmeans'\n    The method used to initialize the weights, the means and the\n    precisions.\n\nweights_init : array-like of shape (n_components, ), default=None\n    The user-provided initial weights.\n    If it is None, weights are initialized using the `init_params` method.\n\nmeans_init : array-like of shape (n_components, n_features), default=None\n    The user-provided initial means,\n    If it is None, means are initialized using the `init_params` method.\n\nprecisions_init : array-like, default=None\n    The user-provided initial precisions (inverse of the covariance\n    matrices).\n    If it is None, precisions are initialized using the 'init_params'\n    method.\n\nrandom_state : int, RandomState instance or None, default=None\n    Controls the random seed given to the method chosen to initialize the\n    parameters.\n\nwarm_start : bool, default=False\n    If 'warm_start' is True, the solution of the last fitting is used as\n    initialization for the next call of fit().\n\nverbose : int, default=0\n    Enable verbose output.\n\nverbose_interval : int, default=10\n    Number of iteration done before the next print.\n\ncontamination : float in (0., 0.5), optional (default=0.1)\n    The amount of contamination of the data set.\n\nAttributes\n----------\nweights_ : array-like of shape (n_components,)\n    The weights of each mixture components.\n\nmeans_ : array-like of shape (n_components, n_features)\n    The mean of each mixture component.\n\ncovariances_ : array-like\n    The covariance of each mixture component.\n\nprecisions_ : array-like\n    The precision matrices for each component in the mixture.\n\nprecisions_cholesky_ : array-like\n    The cholesky decomposition of the precision matrices of each mixture\n    component.\n\nconverged_ : bool\n    True when convergence was reached in fit(), False otherwise.\n\nn_iter_ : int\n    Number of step used by the best fit of EM to reach the convergence.\n\nlower_bound_ : float\n    Lower bound value on the log-likelihood (of the training data with\n    respect to the model) of the best fit of EM.\n\ndecision_scores_ : numpy array of shape (n_samples,)\n    The outlier scores of the training data.\n\nthreshold_ : float\n    The threshold is based on ``contamination``. It is the\n    ``n_samples * contamination`` most abnormal samples in\n    ``decision_scores_``. The threshold is calculated for generating\n    binary outlier labels.\n\nlabels_ : int, either 0 or 1\n    The binary labels of the training data. 0 stands for inliers\n    and 1 for outliers/anomalies. It is generated by applying\n    ``threshold_`` on ``decision_scores_``."
    params: "nan"
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom pyod.models.gmm import GMM\n\nobj = GMM(\n    n_components=1,\n    covariance_type='full',\n    tol=0.001,\n    reg_covar=1e-06,\n    max_iter=100,\n    n_init=1,\n    init_params='kmeans',\n    weights_init=None,\n    means_init=None,\n    precisions_init=None,\n    random_state=None,\n    warm_start=False,\n    contamination=0.1,\n)\n"
