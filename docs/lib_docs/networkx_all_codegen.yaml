    docstring: "Compute the Jaccard coefficient of all node pairs in ebunch.\n\nJaccard coefficient of nodes `u` and `v` is defined as\n\n.. math::\n\n    \\frac{|\\Gamma(u) \\cap \\Gamma(v)|}{|\\Gamma(u) \\cup \\Gamma(v)|}\n\nwhere $\\Gamma(u)$ denotes the set of neighbors of $u$.\n\nParameters\n----------\nG : graph\n    A NetworkX undirected graph.\n\nebunch : iterable of node pairs, optional (default = None)\n    Jaccard coefficient will be computed for each pair of nodes\n    given in the iterable. The pairs must be given as 2-tuples\n    (u, v) where u and v are nodes in the graph. If ebunch is None\n    then all nonexistent edges in the graph will be used.\n    Default value: None.\n\nReturns\n-------\npiter : iterator\n    An iterator of 3-tuples in the form (u, v, p) where (u, v) is a\n    pair of nodes and p is their Jaccard coefficient.\n\nRaises\n------\nNetworkXNotImplemented\n    If `G` is a `DiGraph`, a `Multigraph` or a `MultiDiGraph`.\n\nNodeNotFound\n    If `ebunch` has a node that is not in `G`.\n\nExamples\n--------\n>>> G = nx.complete_graph(5)\n>>> preds = nx.jaccard_coefficient(G, [(0, 1), (2, 3)])\n>>> for u, v, p in preds:\n...     print(f\"({u}, {v}) -> {p:.8f}\")\n(0, 1) -> 0.60000000\n(2, 3) -> 0.60000000\n\nReferences\n----------\n.. [1] D. Liben-Nowell, J. Kleinberg.\n       The Link Prediction Problem for Social Networks (2004).\n       http://www.cs.cornell.edu/home/kleinber/link-pred.pdf"
