    docstring: "Generate a single entry of the graph `G` in GML format.\n\nParameters\n----------\nG : NetworkX graph\n    The graph to be converted to GML.\n\nstringizer : callable, optional\n    A `stringizer` which converts non-int/non-float/non-dict values into\n    strings. If it cannot convert a value into a string, it should raise a\n    `ValueError` to indicate that. Default value: None.\n\nReturns\n-------\nlines: generator of strings\n    Lines of GML data. Newlines are not appended.\n\nRaises\n------\nNetworkXError\n    If `stringizer` cannot convert a value into a string, or the value to\n    convert is not a string while `stringizer` is None.\n\nSee Also\n--------\nliteral_stringizer\n\nNotes\n-----\nGraph attributes named 'directed', 'multigraph', 'node' or\n'edge', node attributes named 'id' or 'label', edge attributes\nnamed 'source' or 'target' (or 'key' if `G` is a multigraph)\nare ignored because these attribute names are used to encode the graph\nstructure.\n\nGML files are stored using a 7-bit ASCII encoding with any extended\nASCII characters (iso8859-1) appearing as HTML character entities.\nWithout specifying a `stringizer`/`destringizer`, the code is capable of\nwriting `int`/`float`/`str`/`dict`/`list` data as required by the GML\nspecification.  For writing other data types, and for reading data other\nthan `str` you need to explicitly supply a `stringizer`/`destringizer`.\n\nFor additional documentation on the GML file format, please see the\n`GML url <https://web.archive.org/web/20190207140002/http://www.fim.uni-passau.de/index.php?id=17297&L=1>`_.\n\nSee the module docstring :mod:`networkx.readwrite.gml` for more details.\n\nExamples\n--------\n>>> G = nx.Graph()\n>>> G.add_node(\"1\")\n>>> print(\"\\n\".join(nx.generate_gml(G)))\ngraph [\n  node [\n    id 0\n    label \"1\"\n  ]\n]\n>>> G = nx.MultiGraph([(\"a\", \"b\"), (\"a\", \"b\")])\n>>> print(\"\\n\".join(nx.generate_gml(G)))\ngraph [\n  multigraph 1\n  node [\n    id 0\n    label \"a\"\n  ]\n  node [\n    id 1\n    label \"b\"\n  ]\n  edge [\n    source 0\n    target 1\n    key 0\n  ]\n  edge [\n    source 0\n    target 1\n    key 1\n  ]\n]"
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: stringizer
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.readwrite.gml import generate_gml\n\nresult = generate_gml(\n    G=None  # TODO,\n    stringizer=None,\n)\n"
