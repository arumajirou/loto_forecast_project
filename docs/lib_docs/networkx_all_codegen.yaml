    docstring: "Transforms a graph into an Eulerian graph.\n\nIf `G` is Eulerian the result is `G` as a MultiGraph, otherwise the result is a smallest\n(in terms of the number of edges) multigraph whose underlying simple graph is `G`.\n\nParameters\n----------\nG : NetworkX graph\n   An undirected graph\n\nReturns\n-------\nG : NetworkX multigraph\n\nRaises\n------\nNetworkXError\n   If the graph is not connected.\n\nSee Also\n--------\nis_eulerian\neulerian_circuit\n\nReferences\n----------\n.. [1] J. Edmonds, E. L. Johnson.\n   Matching, Euler tours and the Chinese postman.\n   Mathematical programming, Volume 5, Issue 1 (1973), 111-114.\n.. [2] https://en.wikipedia.org/wiki/Eulerian_path\n.. [3] http://web.math.princeton.edu/math_alive/5/Notes1.pdf\n\nExamples\n--------\n    >>> G = nx.complete_graph(10)\n    >>> H = nx.eulerize(G)\n    >>> nx.is_eulerian(H)\n    True"
