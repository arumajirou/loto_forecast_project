    docstring: "Computes the node redundancy coefficients for the nodes in the bipartite\ngraph `G`.\n\nThe redundancy coefficient of a node `v` is the fraction of pairs of\nneighbors of `v` that are both linked to other nodes. In a one-mode\nprojection these nodes would be linked together even if `v` were\nnot there.\n\nMore formally, for any vertex `v`, the *redundancy coefficient of `v`* is\ndefined by\n\n.. math::\n\n    rc(v) = \\frac{|\\{\\{u, w\\} \\subseteq N(v),\n    \\: \\exists v' \\neq  v,\\: (v',u) \\in E\\:\n    \\mathrm{and}\\: (v',w) \\in E\\}|}{ \\frac{|N(v)|(|N(v)|-1)}{2}},\n\nwhere `N(v)` is the set of neighbors of `v` in `G`.\n\nParameters\n----------\nG : graph\n    A bipartite graph\n\nnodes : list or iterable (optional)\n    Compute redundancy for these nodes. The default is all nodes in G.\n\nReturns\n-------\nredundancy : dictionary\n    A dictionary keyed by node with the node redundancy value.\n\nExamples\n--------\nCompute the redundancy coefficient of each node in a graph::\n\n    >>> from networkx.algorithms import bipartite\n    >>> G = nx.cycle_graph(4)\n    >>> rc = bipartite.node_redundancy(G)\n    >>> rc[0]\n    1.0\n\nCompute the average redundancy for the graph::\n\n    >>> from networkx.algorithms import bipartite\n    >>> G = nx.cycle_graph(4)\n    >>> rc = bipartite.node_redundancy(G)\n    >>> sum(rc.values()) / len(G)\n    1.0\n\nCompute the average redundancy for a set of nodes::\n\n    >>> from networkx.algorithms import bipartite\n    >>> G = nx.cycle_graph(4)\n    >>> rc = bipartite.node_redundancy(G)\n    >>> nodes = [0, 2]\n    >>> sum(rc[n] for n in nodes) / len(nodes)\n    1.0\n\nRaises\n------\nNetworkXError\n    If any of the nodes in the graph (or in `nodes`, if specified) has\n    (out-)degree less than two (which would result in division by zero,\n    according to the definition of the redundancy coefficient).\n\nReferences\n----------\n.. [1] Latapy, Matthieu, Clémence Magnien, and Nathalie Del Vecchio (2008).\n   Basic notions for the analysis of large two-mode networks.\n   Social Networks 30(1), 31--48."
