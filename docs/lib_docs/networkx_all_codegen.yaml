n be modified as follows::\n\n    >>> import pandas as pd\n    >>> G = nx.Graph([(1, 1), (2, 2)])\n    >>> df = nx.to_pandas_adjacency(G)\n    >>> df\n         1    2\n    1  1.0  0.0\n    2  0.0  1.0\n    >>> diag_idx = list(range(len(df)))\n    >>> df.iloc[diag_idx, diag_idx] *= 2\n    >>> df\n         1    2\n    1  2.0  0.0\n    2  0.0  2.0\n\nExamples\n--------\n>>> G = nx.MultiDiGraph()\n>>> G.add_edge(0, 1, weight=2)\n0\n>>> G.add_edge(1, 0)\n0\n>>> G.add_edge(2, 2, weight=3)\n0\n>>> G.add_edge(2, 2)\n1\n>>> nx.to_pandas_adjacency(G, nodelist=[0, 1, 2], dtype=int)\n   0  1  2\n0  0  2  0\n1  1  0  0\n2  0  0  4"
