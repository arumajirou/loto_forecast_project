    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.algorithms.link_analysis.pagerank_alg import pagerank\n\nresult = pagerank(\n    G=None  # TODO,\n    alpha=0.85,\n    personalization=None,\n    max_iter=100,\n    tol=1e-06,\n    nstart=None,\n    weight='weight',\n    dangling=None,\n)\n"
