    docstring: "Find a maximum single-commodity flow using Dinitz' algorithm.\n\nThis function returns the residual network resulting after computing\nthe maximum flow. See below for details about the conventions\nNetworkX uses for defining residual networks.\n\nThis algorithm has a running time of $O(n^2 m)$ for $n$ nodes and $m$\nedges [1]_.\n\n\nParameters\n----------\nG : NetworkX graph\n    Edges of the graph are expected to have an attribute called\n    'capacity'. If this attribute is not present, the edge is\n    considered to have infinite capacity.\n\ns : node\n    Source node for the flow.\n\nt : node\n    Sink node for the flow.\n\ncapacity : string\n    Edges of the graph G are expected to have an attribute capacity\n    that indicates how much flow the edge can support. If this\n    attribute is not present, the edge is considered to have\n    infinite capacity. Default value: 'capacity'.\n\nresidual : NetworkX graph\n    Residual network on which the algorithm is to be executed. If None, a\n    new residual network is created. Default value: None.\n\nvalue_only : bool\n    If True compute only the value of the maximum flow. This parameter\n    will be ignored by this algorithm because it is not applicable.\n\ncutoff : integer, float\n    If specified, the algorithm will terminate when the flow value reaches\n    or exceeds the cutoff. In this case, it may be unable to immediately\n    determine a minimum cut. Default value: None.\n\nReturns\n-------\nR : NetworkX DiGraph\n    Residual network after computing the maximum flow.\n\nRaises\n------\nNetworkXError\n    The algorithm does not support MultiGraph and MultiDiGraph. If\n    the input graph is an instance of one of these two classes, a\n    NetworkXError is raised.\n\nNetworkXUnbounded\n    If the graph has a path of infinite capacity, the value of a\n    feasible flow on the graph is unbounded above and the function\n    raises a NetworkXUnbounded.\n\nSee also\n--------\n:meth:`maximum_flow`\n:meth:`minimum_cut`\n:meth:`preflow_push`\n:meth:`shortest_augmenting_path`\n\nNotes\n-----\nThe residual network :samp:`R` from an input graph :samp:`G` has the\nsame nodes as :samp:`G`. :samp:`R` is a DiGraph that contains a pair\nof edges :samp:`(u, v)` and :samp:`(v, u)` iff :samp:`(u, v)` is not a\nself-loop, and at least one of :samp:`(u, v)` and :samp:`(v, u)` exists\nin :samp:`G`.\n\nFor each edge :samp:`(u, v)` in :samp:`R`, :samp:`R[u][v]['capacity']`\nis equal to the capacity of :samp:`(u, v)` in :samp:`G` if it exists\nin :samp:`G` or zero otherwise. If the capacity is infinite,\n:samp:`R[u][v]['capacity']` will have a high arbitrary finite value\nthat does not affect the solution of the problem. This value is stored in\n:samp:`R.graph['inf']`. For each edge :samp:`(u, v)` in :samp:`R`,\n:samp:`R[u][v]['flow']` represents the flow function of :samp:`(u, v)` and\nsatisfies :samp:`R[u][v]['flow'] == -R[v][u]['flow']`.\n\nThe flow value, defined as the total flow into :samp:`t`, the sink, is\nstored in :samp:`R.graph['flow_value']`. If :samp:`cutoff` is not\nspecified, reachability to :samp:`t` using only edges :samp:`(u, v)` such\nthat :samp:`R[u][v]['flow'] < R[u][v]['capacity']` induces a minimum\n:samp:`s`-:samp:`t` cut.\n\nExamples\n--------\n>>> from networkx.algorithms.flow import dinitz\n\nThe functions that implement flow algorithms and output a residual\nnetwork, such as this one, are not imported to the base NetworkX\nnamespace, so you have to explicitly import them from the flow package.\n\n>>> G = nx.DiGraph()\n>>> G.add_edge(\"x\", \"a\", capacity=3.0)\n>>> G.add_edge(\"x\", \"b\", capacity=1.0)\n>>> G.add_edge(\"a\", \"c\", capacity=3.0)\n>>> G.add_edge(\"b\", \"c\", capacity=5.0)\n>>> G.add_edge(\"b\", \"d\", capacity=4.0)\n>>> G.add_edge(\"d\", \"e\", capacity=2.0)\n>>> G.add_edge(\"c\", \"y\", capacity=2.0)\n>>> G.add_edge(\"e\", \"y\", capacity=3.0)\n>>> R = dinitz(G, \"x\", \"y\")\n>>> flow_value = nx.maximum_flow_value(G, \"x\", \"y\")\n>>> flow_value\n3.0\n>>> flow_value == R.graph[\"flow_value\"]\nTrue\n\nReferences\n----------\n.. [1] Dinitz' Algorithm: The Original Version and Even's Version.\n       2006. Yefim Dinitz. In Theoretical Computer Science. Lecture\n       Notes in Computer Science. Volume 3895. pp 218-240.\n       https://doi.org/10.1007/11685654_10"
