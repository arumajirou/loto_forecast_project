    docstring: "Compute the average degree connectivity of graph.\n\nThe average degree connectivity is the average nearest neighbor degree of\nnodes with degree k. For weighted graphs, an analogous measure can\nbe computed using the weighted average neighbors degree defined in\n[1]_, for a node `i`, as\n\n.. math::\n\n    k_{nn,i}^{w} = \\frac{1}{s_i} \\sum_{j \\in N(i)} w_{ij} k_j\n\nwhere `s_i` is the weighted degree of node `i`,\n`w_{ij}` is the weight of the edge that links `i` and `j`,\nand `N(i)` are the neighbors of node `i`.\n\nParameters\n----------\nG : NetworkX graph\n\nsource :  \"in\"|\"out\"|\"in+out\" (default:\"in+out\")\n   Directed graphs only. Use \"in\"- or \"out\"-degree for source node.\n\ntarget : \"in\"|\"out\"|\"in+out\" (default:\"in+out\"\n   Directed graphs only. Use \"in\"- or \"out\"-degree for target node.\n\nnodes : list or iterable (optional)\n    Compute neighbor connectivity for these nodes. The default is all\n    nodes.\n\nweight : string or None, optional (default=None)\n   The edge attribute that holds the numerical value used as a weight.\n   If None, then each edge has weight 1.\n\nReturns\n-------\nd : dict\n   A dictionary keyed by degree k with the value of average connectivity.\n\nRaises\n------\nNetworkXError\n    If either `source` or `target` are not one of 'in',\n    'out', or 'in+out'.\n    If either `source` or `target` is passed for an undirected graph.\n\nExamples\n--------\n>>> G = nx.path_graph(4)\n>>> G.edges[1, 2][\"weight\"] = 3\n>>> nx.average_degree_connectivity(G)\n{1: 2.0, 2: 1.5}\n>>> nx.average_degree_connectivity(G, weight=\"weight\")\n{1: 2.0, 2: 1.75}\n\nSee Also\n--------\naverage_neighbor_degree\n\nReferences\n----------\n.. [1] A. Barrat, M. Barthélemy, R. Pastor-Satorras, and A. Vespignani,\n   \"The architecture of complex weighted networks\".\n   PNAS 101 (11): 3747–3752 (2004)."
