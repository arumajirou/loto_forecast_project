    name: refute_invertible_model
    path: dowhy.gcm.validation.refute_invertible_model
    module: dowhy.gcm.validation
    library: dowhy
    top_group: dowhy.gcm
    role: other
    name_cluster: 97
    event_like: False
    return_type: RejectionResult
    docstring: "Validate the assumption that the structural causal models can be represented by a\n:py:class:`InvertibleFunctionalCausalModel <dowhy.gcm.graph.InvertibleFunctionalCausalModel>` (e.g. the causal mechanisms are\n:py:class:`AdditiveNoiseModels <dowhy.gcm.AdditiveNoiseModel>` and/or :py:class:`PostNonlinearModels <dowhy.gcm.PostNonlinearModel>`).\nFor this, it is checked if the residual of a causal mechanism is independent of the mechanism's input\n(i.e. we assume causal sufficiency here). For instance, :py:class:`PostNonlinearModels <dowhy.gcm.PostNonlinearModel>` represent\n    Y = f(g(X) + N),\nwhere f is invertible (g does not need to be), X are the parents of Y and N is (assumed to be) independent noise.\nThe latter point is important here. For given data, we can then reconstruct N and perform an independence test between X and N.\n\nNote that this method only validates the causal mechanisms and not the graph structure.\n\nFor the case of post non-linear models, see the following paper for more details:\n    Zhang, K., and A. Hyvärinen.\n    On the Identifiability of the Post-Nonlinear Causal Model.\n    25th Conference on Uncertainty in Artificial Intelligence (UAI 2009). AUAI Press, 2009.\n\n:param causal_model: A fitted invertible structural causal model.\n:param data: Observations of variables in the DAG.\n:param independence_test: Independence test to use for checking if residual and input are dependent.\n:param significance_level: Significance level for deciding whether input and residual is dependent.\n:param fdr_control_method: Method for false discovery rate (FDR) control. For various options, please refer to `this page <https://www.statsmodels.org/dev/generated/statsmodels.stats.multitest.multipletests.html>`_.\n:return: The outcome of the validation. The causal model can not be rejected if all causal mechanisms are consistent with\n         the invertible model assumption."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: InvertibleStructuralCausalModel
        has_default: false
        default_repr: ""
      -
        name: data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: independence_test
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: kernel_based
      -
        name: significance_level
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.05
      -
        name: fdr_control_method
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.gcm.validation import refute_invertible_model\n\nresult = refute_invertible_model(\n    causal_model=None  # TODO: InvertibleStructuralCausalModel,\n    data=None  # TODO: pd.DataFrame,\n    independence_test=kernel_based,\n    significance_level=0.05,\n    fdr_control_method=None,\n)\n"
