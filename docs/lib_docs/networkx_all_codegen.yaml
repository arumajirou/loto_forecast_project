    docstring: "Returns True if deg_sequence can be realized by a simple graph.\n\nThe validation is done using the Erdős-Gallai theorem [EG1960]_.\n\nParameters\n----------\ndeg_sequence : list\n    A list of integers\n\nReturns\n-------\nvalid : bool\n    True if deg_sequence is graphical and False if not.\n\nExamples\n--------\n>>> G = nx.Graph([(1, 2), (1, 3), (2, 3), (3, 4), (4, 2), (5, 1), (5, 4)])\n>>> sequence = (d for _, d in G.degree())\n>>> nx.is_valid_degree_sequence_erdos_gallai(sequence)\nTrue\n\nTo test a non-valid sequence:\n>>> sequence_list = [d for _, d in G.degree()]\n>>> sequence_list[-1] += 1\n>>> nx.is_valid_degree_sequence_erdos_gallai(sequence_list)\nFalse\n\nNotes\n-----\n\nThis implementation uses an equivalent form of the Erdős-Gallai criterion.\nWorst-case run time is $O(n)$ where $n$ is the length of the sequence.\n\nSpecifically, a sequence d is graphical if and only if the\nsum of the sequence is even and for all strong indices k in the sequence,\n\n .. math::\n\n   \\sum_{i=1}^{k} d_i \\leq k(k-1) + \\sum_{j=k+1}^{n} \\min(d_i,k)\n         = k(n-1) - ( k \\sum_{j=0}^{k-1} n_j - \\sum_{j=0}^{k-1} j n_j )\n\nA strong index k is any index where d_k >= k and the value n_j is the\nnumber of occurrences of j in d.  The maximal strong index is called the\nDurfee index.\n\nThis particular rearrangement comes from the proof of Theorem 3 in [2]_.\n\nThe ZZ condition says that for the sequence d if\n\n.. math::\n    |d| >= \\frac{(\\max(d) + \\min(d) + 1)^2}{4*\\min(d)}\n\nthen d is graphical.  This was shown in Theorem 6 in [2]_.\n\nReferences\n----------\n.. [1] A. Tripathi and S. Vijay. \"A note on a theorem of Erdős & Gallai\",\n   Discrete Mathematics, 265, pp. 417-420 (2003).\n.. [2] I.E. Zverovich and V.E. Zverovich. \"Contributions to the theory\n   of graphic sequences\", Discrete Mathematics, 105, pp. 292-303 (1992).\n.. [EG1960] Erdős and Gallai, Mat. Lapok 11 264, 1960."
    params:
      -
        name: deg_sequence
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
