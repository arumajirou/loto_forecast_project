      -
        name: Xtrain
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.array
        has_default: true
        default_repr: None
      -
        name: percentiles
        kind: POSITIONAL_OR_KEYWORD
        annotation: np.array
        has_default: true
        default_repr: "np.linspace(5, 95, 50)"
      -
        name: metric
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: true
        default_repr: "'qini'"
      -
        name: n_bootstrap
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 1000
