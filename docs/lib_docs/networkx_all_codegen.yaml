    docstring: "Returns the condensation of G.\n\nThe condensation of G is the graph with each of the strongly connected\ncomponents contracted into a single node.\n\nParameters\n----------\nG : NetworkX DiGraph\n   A directed graph.\n\nscc:  list or generator (optional, default=None)\n   Strongly connected components. If provided, the elements in\n   `scc` must partition the nodes in `G`. If not provided, it will be\n   calculated as scc=nx.strongly_connected_components(G).\n\nReturns\n-------\nC : NetworkX DiGraph\n   The condensation graph C of G.  The node labels are integers\n   corresponding to the index of the component in the list of\n   strongly connected components of G.  C has a graph attribute named\n   'mapping' with a dictionary mapping the original nodes to the\n   nodes in C to which they belong.  Each node in C also has a node\n   attribute 'members' with the set of original nodes in G that\n   form the SCC that the node in C represents.\n\nRaises\n------\nNetworkXNotImplemented\n    If G is undirected.\n\nExamples\n--------\nContracting two sets of strongly connected nodes into two distinct SCC\nusing the barbell graph.\n\n>>> G = nx.barbell_graph(4, 0)\n>>> G.remove_edge(3, 4)\n>>> G = nx.DiGraph(G)\n>>> H = nx.condensation(G)\n>>> H.nodes.data()\nNodeDataView({0: {'members': {0, 1, 2, 3}}, 1: {'members': {4, 5, 6, 7}}})\n>>> H.graph[\"mapping\"]\n{0: 0, 1: 0, 2: 0, 3: 0, 4: 1, 5: 1, 6: 1, 7: 1}\n\nContracting a complete graph into one single SCC.\n\n>>> G = nx.complete_graph(7, create_using=nx.DiGraph)\n>>> H = nx.condensation(G)\n>>> H.nodes\nNodeView((0,))\n>>> H.nodes.data()\nNodeDataView({0: {'members': {0, 1, 2, 3, 4, 5, 6}}})\n\nNotes\n-----\nAfter contracting all strongly connected components to a single node,\nthe resulting graph is a directed acyclic graph."
