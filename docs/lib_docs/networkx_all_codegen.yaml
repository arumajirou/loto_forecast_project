    name_cluster: 49
    event_like: False
    return_type: ""
    docstring: "A NodeView class to act as G.nodes for a NetworkX Graph\n\nSet operations act on the nodes without considering data.\nIteration is over nodes. Node data can be looked up like a dict.\nUse NodeDataView to iterate over node data or to specify a data\nattribute for lookup. NodeDataView is created by calling the NodeView.\n\nParameters\n----------\ngraph : NetworkX graph-like class\n\nExamples\n--------\n>>> G = nx.path_graph(3)\n>>> NV = G.nodes()\n>>> 2 in NV\nTrue\n>>> for n in NV:\n...     print(n)\n0\n1\n2\n>>> assert NV & {1, 2, 3} == {1, 2}\n\n>>> G.add_node(2, color=\"blue\")\n>>> NV[2]\n{'color': 'blue'}\n>>> G.add_node(8, color=\"red\")\n>>> NDV = G.nodes(data=True)\n>>> (2, NV[2]) in NDV\nTrue\n>>> for n, dd in NDV:\n...     print((n, dd.get(\"color\", \"aqua\")))\n(0, 'aqua')\n(1, 'aqua')\n(2, 'blue')\n(8, 'red')\n>>> NDV[2] == NV[2]\nTrue\n\n>>> NVdata = G.nodes(data=\"color\", default=\"aqua\")\n>>> (2, NVdata[2]) in NVdata\nTrue\n>>> for n, dd in NVdata:\n...     print((n, dd))\n(0, 'aqua')\n(1, 'aqua')\n(2, 'blue')\n(8, 'red')\n>>> NVdata[2] == NV[2]  # NVdata gets 'color', NV gets datadict\nFalse"
    params: "nan"
