        annotation: int
        has_default: true
        default_repr: 2000
      -
        name: difference_estimation_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Callable[[np.ndarray, np.ndarray], float]"
        has_default: true
        default_repr: auto_estimate_kl_divergence
      -
        name: shapley_config
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[ShapleyConfig]"
        has_default: true
