        kind: POSITIONAL_OR_KEYWORD
        annotation: "Union[PredictionModel, ClassificationModel, str]"
        has_default: true
        default_repr: "'approx'"
      -
        name: subset_scoring_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Callable[[np.ndarray, np.ndarray], Union[np.ndarray, float]]]"
        has_default: true
        default_repr: None
