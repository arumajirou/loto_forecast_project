    role: other
    name_cluster: 110
    event_like: False
    return_type: "Dict[Any, float]"
    docstring: "Computes the causal contribution of each upstream noise term of the target node (including the noise of the\ntarget itself) to the statistical property (e.g. mean, variance) of the target. We call this contribution\n*intrinsic* as noise terms, by definition, do not inherit properties of observed parents. The contribution of each\nnoise term is then the *intrinsic* causal contribution of the corresponding node. For more scientific details,\nplease refer to the paper below.\n\n**Research Paper**:\nJanzing et al. *Quantifying causal contributions via structure preserving interventions*. arXiv:2007.00714, 2021.\n\n:param causal_model: The structural causal model for whose target node we compute the intrinsic causal influence\n                     of its ancestors.\n:param target_node: Target node whose statistical property is to be attributed.\n:param prediction_model: Prediction model for estimating the functional relationship between subsets of ancestor\n                         noise terms and the target node. This can be an instance of a PredictionModel, the string\n                         'approx' or the string 'exact'. With 'exact', the underlying causal models in the graph\n                         are utilized directly by propagating given noise inputs through the graph, which ensures\n                         that generated samples follow the fitted models. In contrast, the 'approx' method involves\n                         selecting and training a suitable model based on data sampled from the graph. This might\n                         lead to deviations from the outcomes of the fitted models, but is faster and can be more\n                         robust in certain settings.\n:param attribution_func: Optional attribution function to measure the statistical property of the target node. This\n                         function expects two inputs; predictions after the randomization of certain features (i.e.\n                         samples from noise nodes) and a baseline where no features were randomized. The baseline\n                         predictions can be typically ignored if one is interested in uncertainty measures such as\n                         entropy or variance, but they might be relevant if, for instance, these shall be estimated\n                         based on the residuals. By default, entropy is used if prediction model is a classifier,\n                         variance otherwise.\n:param num_training_samples: Number of samples drawn from the graphical causal model that are used for fitting the\n                             prediction_model (if necessary).\n:param num_samples_randomization: Number of noise samples drawn from the graphical causal model that are used for\n                                  evaluating the set function. Here, these samples are samples from\n                                  the noise distributions used for randomizing features that are not in the subset.\n:param num_samples_baseline: Number of noise samples drawn from the graphical causal model that are used for\n                             evaluating the set function. Here, these samples are used as fixed observations for\n                             features that are in the subset.\n:param max_batch_size: Maximum batch size for estimating the predictions from evaluation samples. This has a\n                       significant impact on the overall memory usage. If set to -1, all samples are used in one\n                       batch.\n:param auto_assign_quality: Auto assign quality for the 'approx' prediction_model option.\n:param shapley_config: :class:`~dowhy.gcm.shapley.ShapleyConfig` for the Shapley estimator.\n:return: Intrinsic causal contribution of each ancestor node to the statistical property defined by the\n         attribution_func of the target node."
    params:
      -
        name: causal_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: StructuralCausalModel
        has_default: false
        default_repr: ""
      -
        name: target_node
        kind: POSITIONAL_OR_KEYWORD
        annotation: Any
        has_default: false
        default_repr: ""
      -
        name: prediction_model
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Union[PredictionModel, ClassificationModel, str]"
        has_default: true
        default_repr: "'approx'"
      -
        name: attribution_func
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[Callable[[np.ndarray, np.ndarray], float]]"
        has_default: true
        default_repr: None
      -
        name: num_training_samples
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 100000
      -
        name: num_samples_randomization
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 250
      -
        name: num_samples_baseline
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 1000
      -
        name: max_batch_size
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: -1
      -
        name: auto_assign_quality
        kind: POSITIONAL_OR_KEYWORD
        annotation: auto.AssignmentQuality
        has_default: true
        default_repr: auto.AssignmentQuality.GOOD
      -
        name: shapley_config
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[ShapleyConfig]"
        has_default: true
        default_repr: None
