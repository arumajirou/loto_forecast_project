    role: other
    name_cluster: 230
    event_like: False
    return_type: ""
    docstring: "Generate an ordering (permutation) of the graph nodes to make\na sparse matrix.\n\nUses the Cuthill-McKee heuristic (based on breadth-first search) [1]_.\n\nParameters\n----------\nG : graph\n  A NetworkX graph\n\nheuristic : function, optional\n  Function to choose starting node for RCM algorithm.  If None\n  a node from a pseudo-peripheral pair is used.  A user-defined function\n  can be supplied that takes a graph object and returns a single node.\n\nReturns\n-------\nnodes : generator\n   Generator of nodes in Cuthill-McKee ordering.\n\nExamples\n--------\n>>> from networkx.utils import cuthill_mckee_ordering\n>>> G = nx.path_graph(4)\n>>> rcm = list(cuthill_mckee_ordering(G))\n>>> A = nx.adjacency_matrix(G, nodelist=rcm)\n\nSmallest degree node as heuristic function:\n\n>>> def smallest_degree(G):\n...     return min(G, key=G.degree)\n>>> rcm = list(cuthill_mckee_ordering(G, heuristic=smallest_degree))\n\n\nSee Also\n--------\nreverse_cuthill_mckee_ordering\n\nNotes\n-----\nThe optimal solution the bandwidth reduction is NP-complete [2]_.\n\n\nReferences\n----------\n.. [1] E. Cuthill and J. McKee.\n   Reducing the bandwidth of sparse symmetric matrices,\n   In Proc. 24th Nat. Conf. ACM, pages 157-172, 1969.\n   http://doi.acm.org/10.1145/800195.805928\n.. [2]  Steven S. Skiena. 1997. The Algorithm Design Manual.\n   Springer-Verlag New York, Inc., New York, NY, USA."
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
        name: heuristic
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: true
        default_repr: None
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom networkx.utils.rcm import cuthill_mckee_ordering\n\nresult = cuthill_mckee_ordering(\n    G=None  # TODO,\n    heuristic=None,\n)\n"
