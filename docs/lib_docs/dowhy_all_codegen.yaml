    type: function
    name: include_simulated_confounder
    path: dowhy.causal_refuters.add_unobserved_common_cause.include_simulated_confounder
    module: dowhy.causal_refuters.add_unobserved_common_cause
    library: dowhy
    top_group: dowhy.causal_refuters
    role: other
    name_cluster: 278
    event_like: False
    return_type: nan
    docstring: "This function simulates an unobserved confounder based on the data using the following steps:\n1. It calculates the \"residuals\"  from the treatment and outcome model\ni.) The outcome model has outcome as the dependent variable and all the observed variables including treatment as independent variables\nii.) The treatment model has treatment as the dependent variable and all the observed variables as independent variables.\n\n2. U is an intermediate random variable drawn from the normal distribution with the weighted average of residuals as mean and a unit variance\nU ~ N(c1*d_y + c2*d_t, 1)\nwhere\n*d_y and d_t are residuals from the treatment and outcome model\n*c1 and c2 are coefficients to the residuals\n\n3. The final U, which is the simulated unobserved confounder is obtained by debiasing the intermediate variable U by residualising it with X\n\n\nChoosing the coefficients c1 and c2:\nThe coefficients are chosen based on these basic assumptions:\n1. There is a hyperbolic relationship satisfying c1*c2 = c_star\n2. c_star is chosen from a range of possible values based on the correlation of the obtained simulated variable with outcome and treatment.\n3. The product of correlations with treatment and outcome should be at a minimum distance to the maximum correlations with treatment and outcome in any of the observed confounders\n4. The ratio of the weights should be such that they maintain the ratio of the maximum possible observed coefficients within some confidence interval\n\n:param c_star_max: The maximum possible value for the hyperbolic curve on which the coefficients to the residuals lie. It defaults to 1000 in the code if not specified by the user.\n    :type int\n:param convergence_threshold: The threshold to check the plateauing of the correlation while selecting a c_star. It defaults to 0.1 in the code if not specified by the user\n    :type float\n\n:returns: The simulated values of the unobserved confounder based on the data\n    :type pandas.core.series.Series"
    params:
      -
        name: data
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.DataFrame
        has_default: false
        default_repr: ""
      -
        name: treatment_name
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: false
        default_repr: ""
      -
        name: outcome_name
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: false
        default_repr: ""
      -
        name: kappa_t
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: false
        default_repr: ""
      -
        name: kappa_y
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: false
        default_repr: ""
      -
        name: variables_of_interest
        kind: POSITIONAL_OR_KEYWORD
        annotation: List
        has_default: false
        default_repr: ""
      -
        name: convergence_threshold
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: DEFAULT_CONVERGENCE_THRESHOLD
      -
        name: c_star_max
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: DEFAULT_C_STAR_MAX
    code: "# Auto-generated call stub (CLE V10)\n\n# NOTE: TODO のところを埋めてください\n\nfrom dowhy.causal_refuters.add_unobserved_common_cause import include_simulated_confounder\n\nresult = include_simulated_confounder(\n    data=None  # TODO: pd.DataFrame,\n    treatment_name=None  # TODO: str,\n    outcome_name=None  # TODO: str,\n    kappa_t=None  # TODO: float,\n    kappa_y=None  # TODO: float,\n    variables_of_interest=None  # TODO: List,\n    convergence_threshold=DEFAULT_CONVERGENCE_THRESHOLD,\n    c_star_max=DEFAULT_C_STAR_MAX,\n)\n"
