    docstring: "Returns True if deg_sequence can be realized by a simple graph.\n\nThe validation proceeds using the Havel-Hakimi theorem\n[havel1955]_, [hakimi1962]_, [CL1996]_.\nWorst-case run time is $O(s)$ where $s$ is the sum of the sequence.\n\nParameters\n----------\ndeg_sequence : list\n    A list of integers where each element specifies the degree of a node\n    in a graph.\n\nReturns\n-------\nvalid : bool\n    True if deg_sequence is graphical and False if not.\n\nExamples\n--------\n>>> G = nx.Graph([(1, 2), (1, 3), (2, 3), (3, 4), (4, 2), (5, 1), (5, 4)])\n>>> sequence = (d for _, d in G.degree())\n>>> nx.is_valid_degree_sequence_havel_hakimi(sequence)\nTrue\n\nTo test a non-valid sequence:\n>>> sequence_list = [d for _, d in G.degree()]\n>>> sequence_list[-1] += 1\n>>> nx.is_valid_degree_sequence_havel_hakimi(sequence_list)\nFalse\n\nNotes\n-----\nThe ZZ condition says that for the sequence d if\n\n.. math::\n    |d| >= \\frac{(\\max(d) + \\min(d) + 1)^2}{4*\\min(d)}\n\nthen d is graphical.  This was shown in Theorem 6 in [1]_.\n\nReferences\n----------\n.. [1] I.E. Zverovich and V.E. Zverovich. \"Contributions to the theory\n   of graphic sequences\", Discrete Mathematics, 105, pp. 292-303 (1992).\n.. [havel1955] Havel, V. \"A Remark on the Existence of Finite Graphs\"\n   Casopis Pest. Mat. 80, 477-480, 1955.\n.. [hakimi1962] Hakimi, S. \"On the Realizability of a Set of Integers as\n   Degrees of the Vertices of a Graph.\" SIAM J. Appl. Math. 10, 496-506, 1962.\n.. [CL1996] G. Chartrand and L. Lesniak, \"Graphs and Digraphs\",\n   Chapman and Hall/CRC, 1996."
