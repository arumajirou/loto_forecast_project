    name: calc_drift_and_plot
    path: deepchecks.utils.distribution.drift.calc_drift_and_plot
    module: deepchecks.utils.distribution.drift
    library: deepchecks
    top_group: deepchecks.utils
    role: visualize
    name_cluster: 238
    event_like: False
    return_type: "Tuple[float, str, Optional[Figure]]"
    docstring: "Calculate drift score per column.\n\nParameters\n----------\ntrain_column: pd.Series\n    column from train dataset\ntest_column: pd.Series\n    same column from test dataset\nvalue_name: str\n    title of the x axis, if plot_title is None then also the title of the whole plot.\ncolumn_type: str\n    type of column (either \"numerical\" or \"categorical\")\nplot_title: str or None\n    if None use value_name as title otherwise use this.\nmargin_quantile_filter: float, default: 0.025\n    float in range [0,0.5), representing which margins (high and low quantiles) of the distribution will be filtered\n    out of the EMD calculation. This is done in order for extreme values not to affect the calculation\n    disproportionally. This filter is applied to both distributions, in both margins.\nmin_category_size_ratio: float, default 0.01\n    minimum size ratio for categories. Categories with size ratio lower than this number are binned\n    into an \"Other\" category.\nmax_num_categories_for_drift: int, default: None\n    Max number of allowed categories. If there are more, they are binned into an \"Other\" category.\nmax_num_categories_for_display: int, default: 10\n    Max number of categories to show in plot.\nshow_categories_by: str, default: 'largest_difference'\n    Specify which categories to show for categorical features' graphs, as the number of shown categories is limited\n    by max_num_categories_for_display. Possible values:\n    - 'train_largest': Show the largest train categories.\n    - 'test_largest': Show the largest test categories.\n    - 'largest_difference': Show the largest difference between categories.\nnumerical_drift_method: str, default: \"KS\"\n    decides which method to use on numerical variables. Possible values are:\n    \"EMD\" for Earth Mover's Distance (EMD), \"KS\" for Kolmogorov-Smirnov (KS).\ncategorical_drift_method: str, default: \"cramers_v\"\n    decides which method to use on categorical variables. Possible values are:\n    \"cramers_v\" for Cramer's V, \"PSI\" for Population Stability Index (PSI).\nbalance_classes: bool, default: False\n    If True, all categories will have an equal weight in the Cramer's V score. This is useful when the categorical\n    variable is highly imbalanced, and we want to be alerted on changes in proportion to the category size,\n    and not only to the entire dataset. Must have categorical_drift_method = \"cramers_v\".\nignore_na: bool, default True\n    For categorical columns only. If True, ignores nones for categorical drift. If False, considers none as a\n    separate category. For numerical columns we always ignore nones.\nmin_samples : int , default: 10\n    Minimum number of samples required to calculate the drift score. If any of the distributions have less than\n    min_samples, the function will either raise an error or return an invalid output (depends on\n    ``raise_min_sample_error``)\nraise_min_samples_error : bool , default: False\n    Determines whether to raise an error if the number of samples is less than min_samples. If False, returns the\n    output 'not_enough_samples', None, None.\nwith_display: bool, default: True\n    flag that determines if function will calculate display.\ndataset_names: tuple, default: DEFAULT_DATASET_NAMES\n    The names to show in the display for the first and second datasets.\nReturns\n-------\nTuple[float, str, Callable]\n    - drift score of the difference between the two columns' distributions\n    - method name\n    - graph comparing the two distributions (density for numerical, stack bar for categorical)"
    params:
      -
        name: train_column
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.Series
        has_default: false
        default_repr: ""
      -
        name: test_column
        kind: POSITIONAL_OR_KEYWORD
        annotation: pd.Series
        has_default: false
        default_repr: ""
      -
        name: value_name
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: false
        default_repr: ""
      -
        name: column_type
        kind: POSITIONAL_OR_KEYWORD
        annotation: str
        has_default: false
        default_repr: ""
      -
        name: plot_title
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[str]"
        has_default: true
        default_repr: None
      -
        name: margin_quantile_filter
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.025
      -
        name: max_num_categories_for_drift
        kind: POSITIONAL_OR_KEYWORD
        annotation: "Optional[int]"
        has_default: true
        default_repr: None
      -
        name: min_category_size_ratio
        kind: POSITIONAL_OR_KEYWORD
        annotation: float
        has_default: true
        default_repr: 0.01
      -
        name: max_num_categories_for_display
        kind: POSITIONAL_OR_KEYWORD
        annotation: int
        has_default: true
        default_repr: 10
