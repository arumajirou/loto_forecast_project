    docstring: "Returns a minimum weight full matching of the bipartite graph `G`.\n\nLet :math:`G = ((U, V), E)` be a weighted bipartite graph with real weights\n:math:`w : E \\to \\mathbb{R}`. This function then produces a matching\n:math:`M \\subseteq E` with cardinality\n\n.. math::\n   \\lvert M \\rvert = \\min(\\lvert U \\rvert, \\lvert V \\rvert),\n\nwhich minimizes the sum of the weights of the edges included in the\nmatching, :math:`\\sum_{e \\in M} w(e)`, or raises an error if no such\nmatching exists.\n\nWhen :math:`\\lvert U \\rvert = \\lvert V \\rvert`, this is commonly\nreferred to as a perfect matching; here, since we allow\n:math:`\\lvert U \\rvert` and :math:`\\lvert V \\rvert` to differ, we\nfollow Karp [1]_ and refer to the matching as *full*.\n\nParameters\n----------\nG : NetworkX graph\n\n  Undirected bipartite graph\n\ntop_nodes : container\n\n  Container with all nodes in one bipartite node set. If not supplied\n  it will be computed.\n\nweight : string, optional (default='weight')\n\n   The edge data key used to provide each value in the matrix.\n   If None, then each edge has weight 1.\n\nReturns\n-------\nmatches : dictionary\n\n  The matching is returned as a dictionary, `matches`, such that\n  ``matches[v] == w`` if node `v` is matched to node `w`. Unmatched\n  nodes do not occur as a key in `matches`.\n\nRaises\n------\nValueError\n  Raised if no full matching exists.\n\nImportError\n  Raised if SciPy is not available.\n\nNotes\n-----\nThe problem of determining a minimum weight full matching is also known as\nthe rectangular linear assignment problem. This implementation defers the\ncalculation of the assignment to SciPy.\n\nReferences\n----------\n.. [1] Richard Manning Karp:\n   An algorithm to Solve the m x n Assignment Problem in Expected Time\n   O(mn log n).\n   Networks, 10(2):143–152, 1980."
    params:
      -
        name: G
        kind: POSITIONAL_OR_KEYWORD
        annotation: ""
        has_default: false
        default_repr: ""
      -
